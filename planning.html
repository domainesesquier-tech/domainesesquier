<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planning — Domaine Sesquier</title>
  <style>
    /* ------------------------------------------------------------------ */
    /*  RESET & BASE                                                        */
    /* ------------------------------------------------------------------ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-dark:     #1B4332;
      --green:          #2D6A4F;
      --green-mid:      #40916C;
      --green-light:    #D8F3DC;
      --beige-dark:     #C8BEA8;
      --beige:          #EDE8DC;
      --beige-light:    #F8F5EF;
      --white:          #FFFFFF;
      --text:           #1A1A1A;
      --text-muted:     #9DA393;
      --border:         #E8E5DE;
      --shadow:         0 2px 12px rgba(0,0,0,.10);
      --radius:         8px;
      --cell-w:         42px;
      --col-left:       200px;
      /* — variables sidebar identiques à index.html — */
      --primary:        #3A5538;
      --primary-subtle: rgba(58,85,56,0.06);
      --text-secondary: #6B7060;
      --bg-elevated:    #FFFFFF;
      --border-light:   #F0EDE6;
      --radius-xs:      6px;
      --transition:     all 0.2s cubic-bezier(0.4,0,0.2,1);
      --sidebar-width:  240px;
      --surface:        #FFFFFF;
      --accent:         #9E5D4C;
      --warning:        #D4860A;
      --warning-bg:     #FFF6E5;
      --success:        #2D8B56;
      --success-bg:     #E8F5EE;
      --shadow-xs:      0 1px 2px rgba(0,0,0,0.04);
      --shadow-md:      0 4px 6px rgba(0,0,0,0.04), 0 2px 4px rgba(0,0,0,0.03);
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      background: var(--beige-light);
      color: var(--text);
    }

    /* ------------------------------------------------------------------ */
    /*  LAYOUT SHELL                                                        */
    /* ------------------------------------------------------------------ */
    .app {
      display: flex;
      flex-direction: row;
      height: 100vh;
    }

    /* ------------------------------------------------------------------ */
    /*  SIDEBAR                                                             */
    /* ------------------------------------------------------------------ */
    .sidebar {
      width: var(--sidebar-width);
      background: var(--bg-elevated);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      z-index: 100;
      flex-shrink: 0;
      transition: var(--transition);
    }

    .logo-area {
      padding: 20px 18px;
      border-bottom: 1px solid var(--border-light);
    }
    .logo-area h1 {
      font-size: 18px;
      color: var(--primary);
      font-weight: 700;
      line-height: 1.2;
    }
    .logo-area p {
      margin: 2px 0 0;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--text-muted);
      font-weight: 600;
    }

    .nav-list {
      list-style: none;
      padding: 0 8px;
      flex: 1;
      overflow-y: auto;
    }

    .nav-section-title {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--text-muted);
      font-weight: 700;
      padding: 20px 16px 6px;
    }

    .nav-item {
      padding: 8px 12px;
      margin-bottom: 2px;
      border-radius: var(--radius-xs);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      transition: var(--transition);
      position: relative;
      text-decoration: none;
    }
    .nav-item:hover {
      background: var(--primary-subtle);
      color: var(--primary);
    }
    .nav-item.active {
      background: var(--primary);
      color: white;
      box-shadow: 0 2px 8px rgba(58,85,56,0.25);
    }

    /* ------------------------------------------------------------------ */
    /*  CONTENT AREA                                                        */
    /* ------------------------------------------------------------------ */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      overflow: hidden;
    }

    /* ------------------------------------------------------------------ */
    /*  MONTH NAV BAR                                                       */
    /* ------------------------------------------------------------------ */
    .month-bar {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 99;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--white);
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s, border-color .15s;
      white-space: nowrap;
    }
    .btn:hover { background: var(--beige); border-color: var(--beige-dark); }

    .btn-icon {
      padding: 6px 10px;
      font-size: 16px;
      min-width: 34px;
      justify-content: center;
    }

    .btn-primary {
      background: var(--green);
      color: var(--white);
      border-color: var(--green);
    }
    .btn-primary:hover { background: var(--green-dark); border-color: var(--green-dark); }

    .btn-danger {
      background: #EF4444;
      color: #fff;
      border-color: #EF4444;
    }
    .btn-danger:hover { background: #DC2626; border-color: #DC2626; }

    .month-label {
      font-size: 18px;
      font-weight: 700;
      color: var(--green-dark);
      min-width: 140px;
      text-align: center;
    }

    /* ------------------------------------------------------------------ */
    /*  LEGEND                                                              */
    /* ------------------------------------------------------------------ */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 8px 20px;
      background: var(--beige-light);
      border-bottom: 1px solid var(--border);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      font-weight: 500;
    }

    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .reservation-option {
      background-image: repeating-linear-gradient(
        45deg,
        transparent,
        transparent 4px,
        rgba(255,255,255,0.85) 4px,
        rgba(255,255,255,0.85) 8px
      );
    }

    .cell.has-conflict {
      outline: 2px solid #DC2626;
      outline-offset: -2px;
    }
    .conflict-badge {
      position: absolute;
      top: 1px; right: 1px;
      background: #DC2626;
      color: #fff;
      font-size: 8px; font-weight: 800;
      padding: 0 3px; border-radius: 3px; line-height: 14px;
      pointer-events: none; z-index: 10;
    }

    .conflict-list-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--beige);
    }
    .conflict-list-item:last-child { border-bottom: none; }
    .conflict-list-info { flex: 1; min-width: 0; }
    .conflict-list-nom  { font-weight: 700; font-size: 13px; }
    .conflict-list-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    #gantt-tooltip {
      position: fixed;
      background: #222;
      color: #fff;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      pointer-events: none;
      z-index: 9999;
      display: none;
      max-width: 250px;
      line-height: 1.5;
      white-space: pre-line;
    }

    /* ------------------------------------------------------------------ */
    /*  CALENDAR WRAPPER                                                    */
    /* ------------------------------------------------------------------ */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0;
      overflow: hidden;
    }

    .calendar-wrapper {
      flex: 1;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
    }

    /* ------------------------------------------------------------------ */
    /*  CALENDAR TABLE                                                      */
    /* ------------------------------------------------------------------ */
    .calendar-table {
      border-collapse: collapse;
      table-layout: fixed;
      width: 100%;
    }

    .calendar-table th,
    .calendar-table td {
      border: 1px solid var(--border);
    }

    /* Left column — logement name */
    .col-logement {
      position: sticky;
      left: 0;
      z-index: 20;
      width: var(--col-left);
      background: var(--white);
      padding: 0 10px;
      white-space: nowrap;
      border-right: 2px solid var(--beige-dark);
    }

    thead .col-logement {
      background: var(--green-dark);
      color: var(--white);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .05em;
      text-transform: uppercase;
      height: 44px;
      z-index: 30;
    }

    tbody .col-logement {
      height: 38px;
    }

    .logement-name {
      font-weight: 600;
      font-size: 13px;
      color: #111827;
      display: block;
    }

    .logement-cap {
      font-size: 11px;
      color: #6B7280;
      display: block;
    }

    /* Day header cells */
    .col-day {
      min-width: 28px;
      text-align: center;
      vertical-align: middle;
      padding: 2px 0;
      user-select: none;
    }

    thead .col-day {
      background: var(--beige);
      height: 44px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    thead .col-day.today {
      background: var(--green);
      color: var(--white);
    }
    thead .col-day.weekend {
      background: var(--beige-dark);
    }
    thead .col-day.today.weekend {
      background: var(--green);
      color: var(--white);
    }

    .day-name {
      display: block;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .03em;
      text-transform: uppercase;
      line-height: 1;
    }
    .day-num {
      display: block;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.4;
    }

    /* Body cells */
    .cell {
      height: 38px;
      cursor: pointer;
      padding: 0 2px;
      vertical-align: middle;
      overflow: hidden;
      transition: filter .12s;
      position: relative;
    }

    .cell:hover { filter: brightness(.88); }

    .cell.free {
      background: var(--white);
    }
    .cell.free:hover { background: var(--green-light); }

    .cell.today-border {
      box-shadow: inset 0 0 0 2px var(--green-mid);
    }

    .cell-label {
      font-size: 10px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: block;
      padding: 0 2px;
      line-height: 38px;
    }

    tbody tr:hover .col-logement {
      background: var(--beige-light);
    }

    /* Séparateur avant les salles */
    tr.separator-row td {
      background: var(--green-dark);
      color: var(--white);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: 3px 10px;
      height: 22px;
      border: none;
    }

    /* Lignes salles de réception */
    .col-logement.salle {
      background: #F0EDE6;
    }
    tbody tr.salle-row .cell.free {
      background: #F7F4EE;
    }
    tbody tr.salle-row:hover .col-logement {
      background: #E8E4DC;
    }
    .logement-cap.salle-tag {
      color: #8B6914;
      font-weight: 700;
      font-size: 10px;
      background: #FEF3C7;
      border-radius: 3px;
      padding: 0 4px;
    }

    /* ------------------------------------------------------------------ */
    /*  LOADING / ERROR / EMPTY                                             */
    /* ------------------------------------------------------------------ */
    .state-msg {
      padding: 48px 24px;
      text-align: center;
      color: var(--text-muted);
      font-size: 15px;
    }

    .state-msg .icon {
      font-size: 36px;
      display: block;
      margin-bottom: 12px;
    }

    /* ------------------------------------------------------------------ */
    /*  KPI CARDS (copie exacte index.html)                                 */
    /* ------------------------------------------------------------------ */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      padding: 16px 20px;
      background: var(--beige-light);
      border-bottom: 1px solid var(--border);
    }

    .kpi-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 18px 20px;
      box-shadow: var(--shadow-xs);
      border: 1px solid var(--border-light);
      position: relative;
      overflow: hidden;
      transition: var(--transition);
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }
    .kpi-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }

    .kpi-icon {
      width: 42px; height: 42px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .kpi-card:nth-child(1) .kpi-icon { background: var(--primary-subtle); color: var(--primary); }
    .kpi-card:nth-child(2) .kpi-icon { background: linear-gradient(135deg, rgba(158,93,76,0.1), rgba(158,93,76,0.05)); color: var(--accent); }
    .kpi-card:nth-child(3) .kpi-icon { background: var(--warning-bg); color: var(--warning); }
    .kpi-card:nth-child(4) .kpi-icon { background: var(--success-bg); color: var(--success); }

    .kpi-content { flex: 1; min-width: 0; }

    .kpi-label {
      font-size: 11px;
      text-transform: none;
      letter-spacing: 0;
      color: var(--text-muted);
      font-weight: 400;
      margin-bottom: 4px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .kpi-value {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.1;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .kpi-sub {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 2px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    /* ------------------------------------------------------------------ */
    /*  MODAL OVERLAY                                                       */
    /* ------------------------------------------------------------------ */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 200;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
      overflow-y: auto;
    }
    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: var(--white);
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
      width: 100%;
      max-width: 520px;
      padding: 28px;
      position: relative;
      animation: modalIn .18s ease;
    }

    @keyframes modalIn {
      from { transform: translateY(-16px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .modal-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .modal-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--green-dark);
      flex: 1;
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
      color: var(--text-muted);
      line-height: 1;
      padding: 4px;
      border-radius: 4px;
    }
    .modal-close:hover { background: var(--beige); }

    /* Modal detail view */
    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px 20px;
      margin-bottom: 20px;
    }

    .detail-item {}
    .detail-item .label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 2px;
    }
    .detail-item .value {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }
    .detail-item.full { grid-column: 1 / -1; }

    .type-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
    }

    .statut-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      background: var(--beige);
      color: var(--text);
    }
    .statut-badge.confirme  { background: #D1FAE5; color: #065F46; }
    .statut-badge.option    { background: #FEF3C7; color: #92400E; }
    .statut-badge.annule    { background: #FEE2E2; color: #991B1B; }

    .logements-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .logement-tag {
      background: var(--beige);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 12px;
      font-weight: 600;
    }

    .notes-box {
      background: var(--beige-light);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px;
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-wrap;
      color: var(--text);
      min-height: 40px;
    }

    /* Modal actions */
    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      flex-wrap: wrap;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    /* Form */
    .form-row {
      margin-bottom: 14px;
    }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: .04em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .form-input,
    .form-select,
    .form-textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      background: var(--white);
      transition: border-color .15s;
    }
    .form-input:focus,
    .form-select:focus,
    .form-textarea:focus {
      outline: none;
      border-color: var(--green-mid);
      box-shadow: 0 0 0 3px rgba(64,145,108,.15);
    }

    .form-textarea { resize: vertical; min-height: 80px; }

    .form-row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .checkboxes-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 6px;
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 4px;
    }
    .checkbox-item:hover { background: var(--beige); }
    .checkbox-item input { cursor: pointer; accent-color: var(--green); }

    /* ------------------------------------------------------------------ */
    /*  SPINNER                                                             */
    /* ------------------------------------------------------------------ */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto 12px;
    }

    /* ------------------------------------------------------------------ */
    /*  RESPONSIVE                                                          */
    /* ------------------------------------------------------------------ */
    @media (max-width: 768px) {
      :root { --col-left: 110px; --cell-w: 36px; }
      .sidebar { display: none; }
      .app { flex-direction: column; }
      .month-bar { top: 0; }
      #btn-new { display: none; }
      .kpi-grid { display: none; }
      .legend { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; padding: 8px 12px; }
      .cell { height: 32px; }
      tbody .col-logement { height: 32px; }
      .cell-label { line-height: 32px; font-size: 9px; }
      .day-name { font-size: 8px; }
      .day-num  { font-size: 11px; }
      thead .col-day { height: 36px; }
      .modal { padding: 18px; max-height: 90vh; overflow-y: auto; }
      .detail-grid { grid-template-columns: 1fr; }
      .fab-mobile { display: flex; }
    }

    .fab-mobile {
      display: none;
      position: fixed;
      bottom: 20px; right: 20px;
      width: 56px; height: 56px;
      border-radius: 50%;
      background: var(--green);
      color: #fff;
      font-size: 28px; font-weight: 300;
      border: none; cursor: pointer;
      align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(0,0,0,.25);
      z-index: 1000;
    }

    /* Plein écran : masque la sidebar, contenu prend toute la largeur */
    :fullscreen .sidebar,
    :-webkit-full-screen .sidebar { display: none !important; }

    :fullscreen .app,
    :-webkit-full-screen .app { height: 100vh; width: 100vw; }

    :fullscreen .content,
    :-webkit-full-screen .content { width: 100vw; overflow: hidden; }
  </style>
</head>
<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo-area">
      <h1>Domaine Sesquier</h1>
      <p>Gestion Séminaires</p>
    </div>
    <ul class="nav-list">
      <li class="nav-item active">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Planning
      </li>
      <div class="nav-section-title">Gestion</div>
      <a href="index.html" class="nav-item">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        Séminaires
      </a>
    </ul>
  </aside>

  <!-- CONTENT -->
  <div class="content">

<!-- ================================================================ -->
<!--  JAVASCRIPT                                                       -->
<!-- ================================================================ -->
<script>
'use strict';

/* ------------------------------------------------------------------ */
/*  CONSTANTS                                                           */
/* ------------------------------------------------------------------ */
const API_BASE  = 'https://domainesesquier-api.domainesesquier.workers.dev/api';
const AUTH_KEY  = 'planning_auth';
const AUTH_CODE = '2026';

const LOGEMENTS = [
  // ── Gîtes ──────────────────────────────────────────
  { name: 'Acacia',            capacity: '6p',  type: 'gite' },
  { name: 'Hibiscus',          capacity: '8p',  type: 'gite' },
  { name: 'Pivoine',           capacity: '4p',  type: 'gite' },
  { name: 'Belle de nuit',     capacity: '6p',  type: 'gite' },
  { name: 'Iris',              capacity: '4p',  type: 'gite' },
  { name: 'Rose',              capacity: '4p',  type: 'gite' },
  { name: 'Figuier',           capacity: '2p',  type: 'gite' },
  { name: 'Jasmin',            capacity: '4p',  type: 'gite' },
  { name: 'Clos Josette',      capacity: '2p',  type: 'gite' },
  { name: 'Sous les toits',    capacity: '4ch', type: 'gite' },
  // ── Salles de réception ────────────────────────────
  { name: "Champs d'Olivier",  capacity: 'Salle', type: 'salle' },
  { name: 'Archipel',          capacity: 'Salle', type: 'salle' },
];

const COLORS = {
  'Airbnb':              { bg: '#FFC4C6', text: '#7A1A1A' },
  'Booking':             { bg: '#BDD7FF', text: '#1A3A72' },
  'Elloha':              { bg: '#B8EDD6', text: '#1A5C3A' },
  'Séminaire':           { bg: '#D4C5F9', text: '#3D1F8A' },
  'Week-end privé':      { bg: '#FFB8D9', text: '#7A1A52' },
  'Bloqué':              { bg: '#D0D0D0', text: '#444444' },
  'Réservation directe': { bg: '#FFDDB3', text: '#7A3D00' },
  'Mariage':             { bg: '#F5E6A3', text: '#6B4F00' },
};

const TYPES   = Object.keys(COLORS);
const STATUTS = ['Confirmé', 'Option', 'Bloqué', 'Archivé'];

const MONTHS_FR = [
  'Janvier','Février','Mars','Avril','Mai','Juin',
  'Juillet','Août','Septembre','Octobre','Novembre','Décembre'
];

const DAYS_SHORT = ['Di','Lu','Ma','Me','Je','Ve','Sa'];

/* ------------------------------------------------------------------ */
/*  STATE                                                               */
/* ------------------------------------------------------------------ */
let currentYear, currentMonth; // month = 1-indexed
let reservations = [];
let isLoading    = false;

/* ------------------------------------------------------------------ */
/*  AUTH GATE                                                           */
/* ------------------------------------------------------------------ */
function checkAuth() {
  if (localStorage.getItem(AUTH_KEY) === 'true') return true;
  const code = prompt('🔒 Accès protégé — Entrez le code à 4 chiffres :');
  if (code === AUTH_CODE) {
    localStorage.setItem(AUTH_KEY, 'true');
    return true;
  }
  document.body.innerHTML =
    '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;color:#666;font-size:18px;">Accès refusé.</div>';
  return false;
}

/* ------------------------------------------------------------------ */
/*  DATE HELPERS                                                        */
/* ------------------------------------------------------------------ */
function daysInMonth(year, month) {
  return new Date(year, month, 0).getDate();
}

function toYMD(date) {
  return date.toISOString().split('T')[0];
}

function parseYMD(str) {
  const [y, m, d] = str.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function moisParam() {
  return `${currentYear}-${String(currentMonth).padStart(2, '0')}`;
}

/* ------------------------------------------------------------------ */
/*  NORMALISATION — Worker record → objet plat utilisé dans le code    */
/* ------------------------------------------------------------------ */
function recordToRes(record) {
  const f = record.fields || {};
  return {
    id:        record.id,
    nom:       f['Nom']          || '',
    type:      f['Type']         || '',
    logements: f['Logements']    || [],
    arrivee:   f['Date arrivée'] || '',
    depart:    f['Date départ']  || '',
    personnes: f['Nb personnes'] || 0,
    montant:   f['Montant']      || 0,
    statut:    f['Statut']       || 'Confirmé',
    notes:       f['Notes']        || '',
    contact_tel: f['Contact tél']  || '',
    draps:       f['Draps']        || false,
    archived_at:     f['Archived at']     || null,
    statut_original: f['Statut original'] || null,
  };
}

/* ------------------------------------------------------------------ */
/*  API CALLS                                                           */
/* ------------------------------------------------------------------ */
async function apiFetch(url, options = {}) {
  const res = await fetch(url, {
    headers: { 'Content-Type': 'application/json', ...options.headers },
    ...options,
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) {
    const msg = (typeof data.error === 'object' ? data.error?.message : data.error) || `HTTP ${res.status}`;
    throw new Error(msg);
  }
  return data;
}

async function loadPlanning() {
  isLoading = true;
  renderGrid();
  try {
    const data = await apiFetch(`${API_BASE}/planning?mois=${moisParam()}`);
    reservations = (data.records || []).map(recordToRes);
  } catch (e) {
    showFlash('Erreur chargement : ' + e.message, 'error');
    reservations = [];
  }
  isLoading = false;
  renderGrid();
  renderSummary();
}

async function createReservation(fields) {
  const data = await apiFetch(`${API_BASE}/planning`, {
    method: 'POST',
    body: JSON.stringify({ fields }),
  });
  // Nouveau worker : { record: { id, fields: {...} } }
  return recordToRes(data.record || data);
}

async function updateReservation(id, fields) {
  const data = await apiFetch(`${API_BASE}/planning`, {
    method: 'PATCH',
    body: JSON.stringify({ id, fields }),
  });
  // Nouveau worker : { record: { id, fields: {...} } }
  return recordToRes(data.record || data);
}

async function deleteReservation(id) {
  return apiFetch(`${API_BASE}/planning?id=${encodeURIComponent(id)}`, {
    method: 'DELETE',
  });
}

/* ------------------------------------------------------------------ */
/*  LEGEND                                                              */
/* ------------------------------------------------------------------ */
function renderLegend() {
  const el = document.getElementById('legend');
  el.innerHTML = TYPES.map(type => {
    const c = COLORS[type];
    return `<div class="legend-item">
      <span class="legend-dot" style="background:${c.bg};"></span>
      <span>${type}</span>
    </div>`;
  }).join('');
  el.innerHTML += `<div class="legend-item">
    <span class="legend-dot reservation-option" style="background:#999;"></span>
    <span>Option (non confirmée)</span>
  </div>`;
}

/* ------------------------------------------------------------------ */
/*  MONTH LABEL                                                         */
/* ------------------------------------------------------------------ */
function renderMonthLabel() {
  document.getElementById('month-label').textContent =
    `${MONTHS_FR[currentMonth - 1]} ${currentYear}`;
}

/* ------------------------------------------------------------------ */
/*  BUILD GRID DATA STRUCTURE                                           */
/* ------------------------------------------------------------------ */
function buildGrid() {
  const dim  = daysInMonth(currentYear, currentMonth);
  const grid = {};
  LOGEMENTS.forEach(l => { grid[l.name] = {}; });

  reservations.forEach(res => {
    if (res.statut === 'Archivé') return;
    if (!res.arrivee || !res.depart) return;
    const arrDate = parseYMD(res.arrivee);
    const depDate = parseYMD(res.depart);

    (res.logements || []).forEach(logName => {
      if (!grid[logName]) return;
      let isFirst = true;

      for (let cur = new Date(arrDate); cur < depDate; cur.setDate(cur.getDate() + 1)) {
        if (cur.getFullYear() !== currentYear || cur.getMonth() + 1 !== currentMonth) {
          isFirst = false;
          continue;
        }
        const day = cur.getDate();
        if (day < 1 || day > dim) { isFirst = false; continue; }
        grid[logName][day] = { reservation: res, isFirst };
        isFirst = false;
      }
    });
  });

  return grid;
}

function buildConflicts() {
  const dim = daysInMonth(currentYear, currentMonth);
  const map = {};
  LOGEMENTS.forEach(l => { map[l.name] = {}; });
  reservations.forEach(res => {
    if (res.statut !== 'Option' || !res.arrivee || !res.depart) return;
    const arr = parseYMD(res.arrivee), dep = parseYMD(res.depart);
    (res.logements || []).forEach(logName => {
      if (!map[logName]) return;
      for (let cur = new Date(arr); cur < dep; cur.setDate(cur.getDate() + 1)) {
        if (cur.getFullYear() !== currentYear || cur.getMonth() + 1 !== currentMonth) continue;
        const d = cur.getDate();
        if (!map[logName][d]) map[logName][d] = [];
        if (!map[logName][d].find(r => r.id === res.id)) map[logName][d].push(res);
      }
    });
  });
  const conflicts = {};
  Object.entries(map).forEach(([log, days]) => {
    Object.entries(days).forEach(([d, arr]) => {
      if (arr.length >= 2) {
        if (!conflicts[log]) conflicts[log] = {};
        conflicts[log][parseInt(d)] = arr;
      }
    });
  });
  return conflicts;
}

/* ------------------------------------------------------------------ */
/*  RENDER CALENDAR GRID                                                */
/* ------------------------------------------------------------------ */
function renderGrid() {
  const container = document.getElementById('calendar-container');

  if (isLoading) {
    container.innerHTML = `
      <div class="state-msg">
        <div class="spinner"></div>
        Chargement du planning…
      </div>`;
    return;
  }

  const dim   = daysInMonth(currentYear, currentMonth);
  const today = new Date();
  const isThisMonth =
    today.getFullYear() === currentYear && today.getMonth() + 1 === currentMonth;
  const todayDay = today.getDate();

  const grid = buildGrid();
  const conflicts = buildConflicts();

  let html = '<table class="calendar-table" role="grid"><thead><tr>';
  html += '<th class="col-logement" scope="col">Logement</th>';

  for (let d = 1; d <= dim; d++) {
    const date    = new Date(currentYear, currentMonth - 1, d);
    const dayIdx  = date.getDay();
    const weekend = dayIdx === 0 || dayIdx === 6;
    const isToday = isThisMonth && d === todayDay;
    const cls     = ['col-day', weekend ? 'weekend' : '', isToday ? 'today' : '']
                      .filter(Boolean).join(' ');
    html += `<th class="${cls}" scope="col">
      <span class="day-name">${DAYS_SHORT[dayIdx]}</span>
      <span class="day-num">${d}</span>
    </th>`;
  }
  html += '</tr></thead><tbody>';

  let prevType = null;
  LOGEMENTS.forEach(logement => {
    if (prevType === 'gite' && logement.type === 'salle') {
      html += `<tr class="separator-row">
        <td colspan="${dim + 1}" style="background:var(--green-dark);color:rgba(255,255,255,.7);font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:4px 12px;height:24px;border:none;">
          🏛 Salles de réception
        </td>
      </tr>`;
    }
    prevType = logement.type;

    const isSalle = logement.type === 'salle';
    const rowCls  = isSalle ? ' class="salle-row"' : '';
    const colCls  = isSalle ? 'col-logement salle' : 'col-logement';
    const capCls  = isSalle ? 'logement-cap salle-tag' : 'logement-cap';

    html += `<tr${rowCls}>
      <td class="${colCls}">
        <span class="logement-name">${esc(logement.name)}</span>
        <span class="${capCls}">${logement.capacity}</span>
      </td>`;

    for (let d = 1; d <= dim; d++) {
      const isToday  = isThisMonth && d === todayDay;
      const cell     = grid[logement.name][d];
      const todayCls = isToday ? ' today-border' : '';

      if (cell) {
        const res   = cell.reservation;
        const color = COLORS[res.type] || { bg: '#999', text: '#fff' };
        const label = cell.isFirst
          ? esc(res.nom.length > 10 ? res.nom.slice(0, 10) + '…' : res.nom)
          : '';
        const optionCls     = res.statut === 'Option' ? ' reservation-option' : '';
        const conflictList  = conflicts[logement.name]?.[d] || [];
        const conflictCls   = conflictList.length >= 2 ? ' has-conflict' : '';
        const conflictBadge = conflictList.length >= 2
          ? `<span class="conflict-badge">⚠ ${conflictList.length}</span>` : '';
        html += `<td
          class="cell occupied${todayCls}${optionCls}${conflictCls}"
          style="background-color:${color.bg};color:${color.text};"
          data-res-id="${esc(res.id)}"
          data-logement="${esc(logement.name)}"
          data-day="${d}"
          data-conflict-ids="${conflictList.length >= 2 ? conflictList.map(r => r.id).join(',') : ''}"
          role="gridcell"
          tabindex="0"
        ><span class="cell-label">${label}</span>${conflictBadge}</td>`;
      } else {
        html += `<td
          class="cell free${todayCls}"
          data-logement="${esc(logement.name)}"
          data-day="${d}"
          role="gridcell"
          tabindex="0"
        ></td>`;
      }
    }
    html += '</tr>';
  });

  html += '</tbody></table>';
  container.innerHTML = html;

  container.querySelectorAll('td.cell.occupied').forEach(td => {
    const res = reservations.find(r => r.id === td.dataset.resId);
    if (res) {
      const conflictList  = conflicts[td.dataset.logement]?.[parseInt(td.dataset.day)] || [];
      const conflictNames = conflictList.filter(r => r.id !== res.id).map(r => r.nom);
      const tip = buildTooltip(res, conflictNames);
      td.addEventListener('mouseenter', e => showGanttTooltip(tip, e));
      td.addEventListener('mousemove',  e => moveGanttTooltip(e));
      td.addEventListener('mouseleave', hideGanttTooltip);
      td.addEventListener('touchstart', e => {
        e.preventDefault();
        const t = e.touches[0];
        showGanttTooltip(tip, { clientX: t.clientX, clientY: t.clientY });
        setTimeout(hideGanttTooltip, 3000);
      }, { passive: false });
      td.addEventListener('touchend', e => {
        e.preventDefault();
        hideGanttTooltip();
        const conflictIds = (td.dataset.conflictIds || '').split(',').filter(Boolean);
        if (conflictIds.length >= 2) openConflictModal(conflictIds);
        else openDetailModal(res);
      }, { passive: false });
    }
  });

  container.addEventListener('click', onCellClick);
  container.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') onCellClick(e);
  });
}

function formatDateFr(str) {
  if (!str) return '—';
  const mois = ['jan.','fév.','mars','avr.','mai','juin','juil.','août','sept.','oct.','nov.','déc.'];
  const [, m, d] = str.split('-');
  return `${parseInt(d, 10)} ${mois[parseInt(m, 10) - 1]}`;
}

function buildTooltip(res, conflictNames = []) {
  const lines = [
    `${res.nom} — ${formatDateFr(res.arrivee)} au ${formatDateFr(res.depart)}`,
    `${res.personnes} pers.`,
    res.montant ? `${Number(res.montant).toLocaleString('fr-FR')} €` : '',
    res.statut,
    res.notes ? '📝 ' + res.notes.slice(0, 60) : '',
    conflictNames.length ? '⚠ Conflit avec : ' + conflictNames.join(', ') : '',
  ].filter(Boolean).join('\n');
  return lines;
}

const _ganttTip = () => document.getElementById('gantt-tooltip');

function showGanttTooltip(text, e) {
  const el = _ganttTip();
  el.textContent = text;
  el.style.display = 'block';
  moveGanttTooltip(e);
}
function moveGanttTooltip(e) {
  const el = _ganttTip();
  el.style.left = (e.clientX + 12) + 'px';
  el.style.top  = (e.clientY + 12) + 'px';
}
function hideGanttTooltip() {
  _ganttTip().style.display = 'none';
}

/* ------------------------------------------------------------------ */
/*  CONFLICT MODAL                                                      */
/* ------------------------------------------------------------------ */
function openConflictModal(ids) {
  const list = ids.map(id => reservations.find(r => r.id === id)).filter(Boolean);
  const rows = list.map(r => `
    <div class="conflict-list-item">
      <div class="conflict-list-info">
        <div class="conflict-list-nom">${esc(r.nom)}</div>
        <div class="conflict-list-meta">
          ${formatDate(r.arrivee)} → ${formatDate(r.depart)}
          ${r.montant ? ' · ' + Number(r.montant).toLocaleString('fr-FR', {style:'currency',currency:'EUR',maximumFractionDigits:0}) : ''}
        </div>
      </div>
      <button class="btn btn-primary" style="font-size:11px;padding:4px 10px;"
        onclick="closeModal(); setTimeout(() => openDetailModal(reservations.find(r=>r.id==='${esc(r.id)}')), 50)">
        Voir
      </button>
    </div>`).join('');

  openModal(`
    <div class="modal-header">
      <span class="modal-title">⚠ Conflits sur cette date</span>
      <button class="modal-close" onclick="closeModal()" title="Fermer">&#x2715;</button>
    </div>
    <div style="padding:0 4px;">${rows}</div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Fermer</button>
    </div>`);
}

/* ------------------------------------------------------------------ */
/*  CELL CLICK                                                          */
/* ------------------------------------------------------------------ */
function onCellClick(e) {
  const cell = e.target.closest('td.cell');
  if (!cell) return;

  const logement = cell.dataset.logement;
  const day      = parseInt(cell.dataset.day, 10);
  const resId    = cell.dataset.resId;

  if (resId) {
    const conflictIds = (cell.dataset.conflictIds || '').split(',').filter(Boolean);
    if (conflictIds.length >= 2) {
      openConflictModal(conflictIds);
    } else {
      const res = reservations.find(r => r.id === resId);
      if (res) openDetailModal(res);
    }
  } else {
    if (window.innerWidth > 768) {
      const dateStr = `${currentYear}-${String(currentMonth).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
      openCreateModal(logement, dateStr);
    }
  }
}

/* ------------------------------------------------------------------ */
/*  SUMMARY                                                             */
/* ------------------------------------------------------------------ */
function renderSummary() {
  const dim   = daysInMonth(currentYear, currentMonth);
  const gites = LOGEMENTS.filter(l => l.type === 'gite');
  const total = dim * gites.length;

  let occupied = 0;
  let ca       = 0;

  reservations.forEach(res => {
    if (res.statut === 'Confirmé') {
      const arr   = parseYMD(res.arrivee);
      const dep   = parseYMD(res.depart);
      const nLogs = (res.logements || []).filter(l =>
        gites.some(lg => lg.name === l)
      ).length;

      let nights = 0;
      for (let cur = new Date(arr); cur < dep; cur.setDate(cur.getDate() + 1)) {
        if (cur.getFullYear() === currentYear && cur.getMonth() + 1 === currentMonth) {
          nights++;
        }
      }
      occupied += nights * nLogs;
      ca       += Number(res.montant) || 0;
    }
  });

  const taux = total > 0 ? Math.round((occupied / total) * 100) : 0;

  document.getElementById('sum-dispo').textContent = total;
  document.getElementById('sum-occ').textContent   = occupied;
  document.getElementById('sum-taux').textContent  = taux + ' %';
  document.getElementById('sum-ca').textContent    =
    ca.toLocaleString('fr-FR', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 });
}

/* ------------------------------------------------------------------ */
/*  MODALS                                                              */
/* ------------------------------------------------------------------ */
const overlay  = document.getElementById('modal-overlay');
const modalBox = document.getElementById('modal-box');

function openModal(html) {
  modalBox.innerHTML = html;
  overlay.classList.add('open');
  modalBox.querySelector('.modal-close')?.focus();
}

function closeModal() {
  overlay.classList.remove('open');
  modalBox.innerHTML = '';
}

overlay.addEventListener('click', e => {
  if (e.target === overlay) closeModal();
});

document.addEventListener('keydown', e => {

/* ----  FORM MODAL (create / edit)  ---- */
function openCreateModal(logement, dateStr) {
  const res = {
    id: null,
    nom: '', type: TYPES[0], logements: [logement],
    arrivee: dateStr, depart: '', personnes: '', montant: '', statut: 'Confirmé', notes: '',
  };
  openFormModal(res, false);
}

function openEditModal(id) {
  const res = reservations.find(r => r.id === id);
  if (!res) return;
  closeModal();
  setTimeout(() => openFormModal(res, true), 50);
}

/* ----  FORM SUBMIT  ---- */
async function submitForm(e, id) {
  e.preventDefault();
  const form = e.target;
  const btn  = document.getElementById('submit-btn');

  const logements = Array.from(
    form.querySelectorAll('input[name="logements"]:checked')
  ).map(cb => cb.value);

  if (logements.length === 0) {
    showFlash('Sélectionnez au moins un logement.', 'error');
    return;
  }

  const arrivee = form.arrivee.value;
  const depart  = form.depart.value;
  if (depart <= arrivee) {
    showFlash("La date de départ doit être après l'arrivée.", 'error');
    return;
  }

  // Champs au format attendu par le nouveau worker
  const fields = {
    'Nom':          form.nom.value.trim(),
    'Type':         form.type.value,
    'Logements':    logements,
    'Date arrivée': arrivee,
    'Date départ':  depart,
    'Statut':       form.statut.value,
  };
  if (form.personnes.value) fields['Nb personnes'] = parseInt(form.personnes.value, 10);
  if (form.montant.value)   fields['Montant']      = parseFloat(form.montant.value);
  if (form.notes.value)       fields['Notes']       = form.notes.value.trim();
  if (form.contact_tel.value) fields['Contact tél'] = form.contact_tel.value.trim();
  fields['Draps'] = form.draps.checked;

  btn.disabled    = true;
  btn.textContent = 'Enregistrement…';

  try {
    if (id) {
      const updated = await updateReservation(id, fields);
      const idx = reservations.findIndex(r => r.id === id);
      if (idx !== -1) reservations[idx] = updated;
    } else {
      const created = await createReservation(fields);
      reservations.push(created);
    }
    closeModal();
    renderGrid();
    renderSummary();
    showFlash(id ? 'Réservation modifiée.' : 'Réservation créée.', 'success');
  } catch (err) {
    showFlash('Erreur : ' + err.message, 'error');
    btn.disabled    = false;
    btn.textContent = id ? 'Enregistrer les modifications' : 'Créer la réservation';
  }
}

/* ----  DELETE CONFIRM  ---- */
async function confirmDelete(id) {
  if (!confirm('Supprimer définitivement cette réservation ?')) return;

  closeModal();
  try {
    await deleteReservation(id);
    reservations = reservations.filter(r => r.id !== id);
    renderGrid();
    renderSummary();
    showFlash('Réservation supprimée.', 'success');
  } catch (err) {
    showFlash('Erreur suppression : ' + err.message, 'error');
  }
}

async function confirmArchive(id) {
  if (!confirm('Archiver cette réservation ?')) return;
  try {
    const res = reservations.find(r => r.id === id);
    const statutOriginal = res ? res.statut : null;
    await updateReservation(id, {
      'Statut':          'Archivé',
      'Archived at':     new Date().toISOString(),
      'Statut original': statutOriginal,
    });
    reservations = reservations.filter(r => r.id !== id);
    closeModal();
    renderGrid();
    renderSummary();
    showFlash('Réservation archivée.', 'success');
  } catch (err) {
    showFlash('Erreur : ' + err.message, 'error');
  }
}

/* ------------------------------------------------------------------ */
/*  FLASH NOTIFICATION                                                  */
/* ------------------------------------------------------------------ */
let flashTimer = null;

function showFlash(msg, type = 'info') {
  let el = document.getElementById('flash');
  if (!el) {
    el = document.createElement('div');
    el.id = 'flash';
    el.style.cssText = [
      'position:fixed', 'bottom:24px', 'right:24px', 'z-index:500',
      'padding:12px 20px', 'border-radius:8px', 'font-size:14px',
      'font-weight:600', 'box-shadow:0 4px 16px rgba(0,0,0,.2)',
      'max-width:360px', 'transition:opacity .3s',
    ].join(';');
    document.body.appendChild(el);
  }

  el.textContent       = msg;
  el.style.background  = type === 'error' ? '#EF4444' : type === 'success' ? '#059669' : '#3B82F6';
  el.style.color       = '#fff';
  el.style.opacity     = '1';

  clearTimeout(flashTimer);
  flashTimer = setTimeout(() => { el.style.opacity = '0'; }, 3500);
}

/* ------------------------------------------------------------------ */
/*  UTILS                                                               */
/* ------------------------------------------------------------------ */
function esc(str) {
  return String(str ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function formatDate(str) {
  if (!str) return '—';
  const [y, m, d] = str.split('-');
  return `${d}/${m}/${y}`;
}

function statutBadgeClass(statut) {
  if (statut === 'Confirmé') return 'confirme';
  if (statut === 'Option')   return 'option';
  if (statut === 'Bloqué')   return 'annule';
  return '';
}

/* ------------------------------------------------------------------ */
/*  NAVIGATION                                                          */
/* ------------------------------------------------------------------ */
function goToPrev() {
  currentMonth--;
  if (currentMonth < 1) { currentMonth = 12; currentYear--; }
  renderMonthLabel();
  loadPlanning();
}

function goToNext() {
  currentMonth++;
  if (currentMonth > 12) { currentMonth = 1; currentYear++; }
  renderMonthLabel();
  loadPlanning();
}

function goToToday() {
  const now = new Date();
  currentYear  = now.getFullYear();
  currentMonth = now.getMonth() + 1;
  renderMonthLabel();
  loadPlanning();
}

/* ------------------------------------------------------------------ */
/*  INIT                                                                */
/* ------------------------------------------------------------------ */
function init() {
  if (!checkAuth()) return;

  const now    = new Date();
  currentYear  = now.getFullYear();
  currentMonth = now.getMonth() + 1;

  renderLegend();
  renderMonthLabel();

  document.getElementById('btn-prev').addEventListener('click', goToPrev);
  document.getElementById('btn-next').addEventListener('click', goToNext);
  document.getElementById('btn-today').addEventListener('click', goToToday);
  document.getElementById('btn-new').addEventListener('click', () => {
    openCreateModal(LOGEMENTS[0].name, toYMD(new Date()));
  });
  const fabMobile = document.getElementById('fab-mobile');
  if (fabMobile) fabMobile.addEventListener('click', () => {
    openCreateModal(LOGEMENTS[0].name, toYMD(new Date()));
  });

  loadPlanning();
}

function toggleFullscreen() {
  const btn = document.getElementById('btn-fullscreen');
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
    btn.textContent = '✕';
    btn.title = 'Quitter le plein écran';
  } else {
    document.exitFullscreen();
    btn.textContent = '⛶';
    btn.title = 'Plein écran';
  }
}
document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement) {
    const btn = document.getElementById('btn-fullscreen');
    if (btn) { btn.textContent = '⛶'; btn.title = 'Plein écran'; }
  }
});
</script>
<div id="gantt-tooltip"></div>
<button class="fab-mobile" id="fab-mobile" aria-label="Nouvelle réservation">＋</button>
<script>init();</script>
