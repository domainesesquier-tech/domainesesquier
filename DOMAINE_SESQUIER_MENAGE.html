<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ménage — Domaine Sesquier</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="assets/utils.js"></script>
    <style>
        :root {
            --primary:       #3A5538;
            --primary-light: #e8f0e8;
            --accent:        #B98A4D;
            --bg:            #F4F2EE;
            --surface:       #ffffff;
            --border:        #E2DDD5;
            --text:          #2D302A;
            --muted:         #777;
            --danger:        #e74c3c;
            --danger-bg:     #fef2f2;
            --success:       #27ae60;
            --success-bg:    #f0fdf4;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
            padding-bottom: 60px;
        }

        /* ── Toolbar ─────────────────────────────────── */
        .toolbar {
            background: var(--primary);
            color: white;
            padding: 12px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            gap: 10px;
        }
        .toolbar-title { font-weight: 700; font-size: 13px; letter-spacing: 0.8px; text-transform: uppercase; }
        .btn-team {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        .btn-team:hover { background: rgba(255,255,255,0.25); }

        /* ── Dossier bar ─────────────────────────────── */
        .dossier-bar {
            background: white;
            border-bottom: 1px solid var(--border);
            padding: 10px 18px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        .bar-cell .bar-label { font-size: 10px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; }
        .bar-cell .bar-value { font-size: 13px; font-weight: 600; color: var(--text); margin-top: 1px; }

        /* ── Grid ────────────────────────────────────── */
        .menage-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
            gap: 14px;
            padding: 14px;
        }

        /* ── Card ────────────────────────────────────── */
        .menage-card {
            background: var(--surface);
            border-radius: 14px;
            border: 2px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: opacity 0.2s, border-color 0.2s;
        }
        .menage-card.active {
            border-color: var(--primary);
            box-shadow: 0 4px 16px rgba(58,85,56,0.13);
        }
        .menage-card.inactive { opacity: 0.42; }

        .card-header {
            background: var(--primary);
            color: white;
            padding: 11px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .menage-card.inactive .card-header { background: #9aaba9; }
        .card-title { font-weight: 700; font-size: 14px; display: flex; align-items: center; gap: 7px; }
        .card-status-badge {
            font-size: 10px; font-weight: 700;
            padding: 3px 9px; border-radius: 20px;
            text-transform: uppercase; letter-spacing: 0.4px;
            flex-shrink: 0;
        }
        .card-status-badge.used     { background: #92c47a; color: #1a3a10; }
        .card-status-badge.free     { background: rgba(255,255,255,0.18); color: rgba(255,255,255,0.75); }

        /* ── Séjours ─────────────────────────────────── */
        .sejours-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            border-bottom: 1px solid var(--border);
        }
        .sejour-cell {
            padding: 9px 14px;
            background: #f8f7f4;
        }
        .sejour-cell + .sejour-cell { border-left: 1px solid var(--border); }
        .sejour-label {
            font-size: 9px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.5px; color: var(--muted); margin-bottom: 3px;
            display: flex; align-items: center; gap: 5px;
        }
        .sejour-client { font-size: 12px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .sejour-date   { font-size: 11px; color: var(--muted); margin-top: 1px; }
        .sejour-empty  { font-size: 12px; color: #bbb; font-style: italic; }

        /* ── Card body ───────────────────────────────── */
        .card-body { padding: 14px; display: flex; flex-direction: column; gap: 13px; flex: 1; }

        .section-label {
            font-size: 10px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.5px; color: var(--muted);
            display: flex; align-items: center; gap: 6px; margin-bottom: 6px;
        }

        .note-area {
            width: 100%; min-height: 62px;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 10px;
            font-family: inherit; font-size: 12px;
            color: var(--text); background: #f8f7f4;
            resize: vertical; line-height: 1.5;
            transition: border-color 0.15s, background 0.15s;
        }
        .note-area:focus { outline: none; border-color: var(--primary); background: white; }

        /* ── Signalements ────────────────────────────── */
        .signal-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 6px; }
        .signal-item {
            display: flex; align-items: flex-start; gap: 8px;
            padding: 8px 10px; border-radius: 8px;
            border: 1px solid var(--border); background: #f8f7f4;
            font-size: 12px; transition: opacity 0.2s;
        }
        .signal-item.traite { opacity: 0.5; }
        .signal-item.traite .signal-texte { text-decoration: line-through; }
        .signal-texte { flex: 1; line-height: 1.4; }
        .signal-date  { font-size: 10px; color: var(--muted); margin-top: 2px; }
        .signal-toggle {
            font-size: 9px; font-weight: 700; padding: 3px 8px; border-radius: 10px;
            cursor: pointer; border: none; font-family: inherit; flex-shrink: 0; white-space: nowrap;
        }
        .signal-toggle.a_traiter { background: #fee2e2; color: #b91c1c; }
        .signal-toggle.traite    { background: var(--success-bg); color: #15803d; }
        .btn-add-signal {
            display: flex; align-items: center; gap: 6px; justify-content: center;
            font-size: 12px; font-weight: 600; color: var(--primary);
            background: var(--primary-light); border: 1px dashed var(--primary);
            border-radius: 8px; padding: 7px 12px; cursor: pointer;
            font-family: inherit; width: 100%;
            transition: background 0.15s;
        }
        .btn-add-signal:hover { background: #d4e6d4; }

        /* ── Assignation ─────────────────────────────── */
        .assignation-wrap { display: flex; flex-direction: column; gap: 5px; }
        .assignation-row {
            display: flex; align-items: center; gap: 10px;
            padding: 9px 12px; background: #f8f7f4;
            border: 1px solid var(--border); border-radius: 8px;
        }
        .assign-select {
            flex: 1; border: none; background: transparent;
            font-family: inherit; font-size: 13px; font-weight: 500;
            color: var(--text); outline: none; cursor: pointer;
            min-width: 0;
        }
        .fait-wrap { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
        .fait-checkbox { width: 18px; height: 18px; cursor: pointer; accent-color: var(--primary); }
        .fait-label { font-size: 12px; font-weight: 600; color: var(--muted); white-space: nowrap; }
        .fait-at {
            font-size: 10px; color: var(--success); font-weight: 600;
            display: flex; align-items: center; gap: 5px; padding-left: 2px;
        }

        /* ── Divider ─────────────────────────────────── */
        .divider { height: 1px; background: var(--border); }

        /* ── Toast ───────────────────────────────────── */
        .toast {
            position: fixed; bottom: 24px; left: 50%;
            transform: translateX(-50%) translateY(16px);
            background: #2D302A; color: white;
            padding: 9px 18px; border-radius: 10px;
            font-size: 12px; font-weight: 600;
            z-index: 9999; opacity: 0; pointer-events: none;
            transition: all 0.22s;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* ── Loading ─────────────────────────────────── */
        .loading { display: flex; align-items: center; justify-content: center; padding: 60px 20px; color: var(--muted); gap: 10px; font-size: 14px; }

        /* ── Modal ───────────────────────────────────── */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.4); z-index: 1000;
            align-items: center; justify-content: center; padding: 20px;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: white; border-radius: 16px; padding: 22px;
            width: 100%; max-width: 400px; max-height: 85vh; overflow-y: auto;
        }
        .modal-title { font-size: 15px; font-weight: 700; color: var(--primary); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
        .modal-input {
            width: 100%; border: 1px solid var(--border); border-radius: 8px;
            padding: 10px 12px; font-family: inherit; font-size: 14px;
            color: var(--text); outline: none; resize: vertical;
        }
        .modal-input:focus { border-color: var(--primary); }
        .team-member {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 12px; background: #f8f7f4; border-radius: 8px;
            margin-bottom: 6px; font-size: 13px; font-weight: 500;
        }
        .btn-del-member { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 14px; padding: 0 2px; }
        .modal-footer { display: flex; gap: 10px; margin-top: 14px; }
        .btn-m {
            flex: 1; padding: 10px; border-radius: 10px; border: none;
            font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer;
        }
        .btn-m.primary   { background: var(--primary); color: white; }
        .btn-m.secondary { background: #f1f5f9; color: var(--text); }
        .add-row { display: flex; gap: 8px; margin-top: 10px; }
        .add-row .modal-input { margin: 0; flex: 1; }
        .btn-add-inline { background: var(--primary); color: white; border: none; border-radius: 8px; padding: 0 14px; cursor: pointer; font-size: 16px; font-weight: 700; }

        /* ── Responsive ──────────────────────────────── */
        @media (max-width: 480px) {
            .menage-grid { grid-template-columns: 1fr; padding: 10px; gap: 10px; }
            .sejours-row { grid-template-columns: 1fr; }
            .sejour-cell + .sejour-cell { border-left: none; border-top: 1px solid var(--border); }
        }
    </style>
</head>
<body>

<div class="toolbar">
    <span class="toolbar-title"><i class="fa-solid fa-broom"></i>&nbsp; Ménage & Remise en état</span>
    <button class="btn-team" onclick="openTeamModal()">
        <i class="fa-solid fa-users"></i> Équipe
    </button>
</div>

<div class="dossier-bar" id="dossier-bar">
    <div class="bar-cell"><div class="bar-label">Groupe</div><div class="bar-value" id="bar-client">—</div></div>
    <div class="bar-cell"><div class="bar-label">Dates</div><div class="bar-value" id="bar-dates">—</div></div>
    <div class="bar-cell"><div class="bar-label">Participants</div><div class="bar-value" id="bar-pers">—</div></div>
</div>

<div id="menage-grid" class="menage-grid">
    <div class="loading"><i class="fa-solid fa-spinner fa-spin"></i> Chargement…</div>
</div>

<div class="toast" id="toast"></div>

<!-- Modal : Équipe ménage -->
<div class="modal-overlay" id="modal-team">
    <div class="modal">
        <div class="modal-title"><i class="fa-solid fa-users"></i> Équipe ménage</div>
        <div id="team-list"></div>
        <div class="add-row">
            <input class="modal-input" id="new-member-input" placeholder="Ajouter un nom…"
                   onkeypress="if(event.key==='Enter') addMember()">
            <button class="btn-add-inline" onclick="addMember()">+</button>
        </div>
        <div class="modal-footer">
            <button class="btn-m secondary" onclick="closeTeamModal()">Fermer</button>
        </div>
    </div>
</div>

<!-- Modal : Signalement -->
<div class="modal-overlay" id="modal-signal">
    <div class="modal">
        <div class="modal-title"><i class="fa-solid fa-triangle-exclamation"></i> Nouveau signalement</div>
        <textarea class="modal-input" id="signal-input" rows="3" placeholder="Décrivez le problème constaté…" style="margin-bottom:0;"></textarea>
        <div class="modal-footer">
            <button class="btn-m secondary" onclick="closeSignalModal()">Annuler</button>
            <button class="btn-m primary"   onclick="confirmSignal()">Ajouter</button>
        </div>
    </div>
</div>

<script>
    const API     = SesquierUtils.API_BASE;
    const API_RES = SesquierUtils.API_RESERVATIONS_URL;

    // ── Logements (mêmes IDs que INITIAL_GITES dans ROOMING) ──────────────
    const LOGEMENTS = [
        { id: 'acacia',   name: 'Acacia' },
        { id: 'hibiscus', name: 'Hibiscus' },
        { id: 'pivoine',  name: 'Pivoine' },
        { id: 'belle',    name: 'Belle de nuit' },
        { id: 'iris',     name: 'Iris' },
        { id: 'rose',     name: 'Rose' },
        { id: 'figuier',  name: 'Figuier' },
        { id: 'jasmin',   name: 'Jasmin' },
        { id: 'josette',  name: 'Clos Josette' },
        { id: 'toits',    name: 'Sous les toits' },
    ];

    // ── State ───────────────────────────────────────────────────────────────
    let currentDossierId  = null;
    let currentRecord     = null;  // fields of current dossier
    let activeGites       = new Set();
    let menageData        = {};    // { logementId: { note_permanente, protocole, signalements } }
    let menageState       = {};    // { logementId: { assignee, fait, fait_at } }  — per dossier
    let upcomingRecords   = [];    // reservations with date_arrivee > today
    let team              = [];
    let currentSignalId   = null;  // logement being signaled

    // ── Team ────────────────────────────────────────────────────────────────
    function loadTeam()  { try { team = JSON.parse(localStorage.getItem('ds_menage_team') || '[]'); } catch { team = []; } }
    function persistTeam(){ localStorage.setItem('ds_menage_team', JSON.stringify(team)); }

    function openTeamModal()  {
        renderTeamList();
        document.getElementById('modal-team').classList.add('open');
    }
    function closeTeamModal() {
        document.getElementById('modal-team').classList.remove('open');
        renderGrid();   // refresh selects
    }
    function renderTeamList() {
        const el = document.getElementById('team-list');
        if (!team.length) {
            el.innerHTML = '<div style="color:#aaa;font-size:13px;font-style:italic;margin-bottom:8px;">Aucun membre. Ajoutez des noms ci-dessous.</div>';
            return;
        }
        el.innerHTML = team.map((n, i) => `
            <div class="team-member">
                <span>${escHtml(n)}</span>
                <button class="btn-del-member" onclick="removeMember(${i})" title="Supprimer">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>`).join('');
    }
    function addMember() {
        const inp = document.getElementById('new-member-input');
        const name = inp.value.trim();
        if (!name || team.includes(name)) return;
        team.push(name);
        persistTeam();
        inp.value = '';
        renderTeamList();
    }
    function removeMember(i) {
        team.splice(i, 1);
        persistTeam();
        renderTeamList();
    }

    // ── Toast ────────────────────────────────────────────────────────────────
    let _toastTimer;
    function showToast(msg, isErr = false) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.style.background = isErr ? '#c0392b' : '#2D302A';
        el.classList.add('show');
        clearTimeout(_toastTimer);
        _toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
    }

    // ── Helpers ──────────────────────────────────────────────────────────────
    function fmtDate(str) {
        if (!str) return '—';
        return new Date(str).toLocaleDateString('fr-FR', { day: 'numeric', month: 'short' });
    }
    function fmtDatetime(iso) {
        if (!iso) return '';
        return new Date(iso).toLocaleDateString('fr-FR', {
            day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit'
        });
    }
    function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
    function escHtml(s) {
        return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Load ─────────────────────────────────────────────────────────────────
    async function loadAll() {
        currentDossierId = new URLSearchParams(window.location.search).get('id');
        loadTeam();

        try {
            // 1. Dossier courant
            if (currentDossierId) {
                const res = await SesquierUtils.fetchJson(`${API_RES}?id=${currentDossierId}`);
                const rec = res.records ? res.records[0] : res;
                if (rec && rec.fields) {
                    currentRecord = rec.fields;
                    try {
                        const rooming = JSON.parse(currentRecord['Rooming JSON'] || '{}');
                        activeGites = new Set(rooming.activeGites || []);
                    } catch {}
                    try {
                        menageState = JSON.parse(currentRecord['Menage JSON'] || '{}');
                    } catch { menageState = {}; }
                }
            }

            // 2. Toutes les réservations à venir (pour séjour suivant)
            const today = new Date().toISOString().split('T')[0];
            const allRes = await SesquierUtils.fetchJson(API_RES);
            upcomingRecords = (allRes.records || [])
                .filter(r => {
                    const f = r.fields || {};
                    const statut = (f.statut || f['Statut'] || '').toLowerCase();
                    return f['Date arrivée'] > today
                        && statut !== 'annulé'
                        && !f.est_archive;
                })
                .sort((a, b) =>
                    (a.fields['Date arrivée'] || '').localeCompare(b.fields['Date arrivée'] || '')
                );

            // 3. Données permanentes ménage
            const menageRes = await SesquierUtils.fetchJson(`${API}/api/menage`);
            (menageRes.records || []).forEach(r => { menageData[r.logement_id] = r; });

            // Dossier bar
            if (currentRecord) {
                document.getElementById('bar-client').textContent = currentRecord['Nom client'] || '—';
                document.getElementById('bar-dates').textContent  =
                    `${fmtDate(currentRecord['Date arrivée'])} → ${fmtDate(currentRecord['Date départ'])}`;
                document.getElementById('bar-pers').textContent   =
                    (currentRecord['Nombre de personnes'] || currentRecord['Nb personnes'] || '—') + ' pers.';
            }

            renderGrid();
        } catch (e) {
            document.getElementById('menage-grid').innerHTML =
                `<div class="loading" style="color:var(--danger);">
                    <i class="fa-solid fa-circle-exclamation"></i> Erreur : ${escHtml(e.message)}
                 </div>`;
        }
    }

    // ── Séjour suivant ────────────────────────────────────────────────────────
    function getNextStay(logementId) {
        for (const r of upcomingRecords) {
            const f = r.fields || {};
            try {
                const rooming = JSON.parse(f['Rooming JSON'] || '{}');
                if ((rooming.activeGites || []).includes(logementId)) {
                    return { client: f['Nom client'] || '—', date: f['Date arrivée'] };
                }
            } catch {}
        }
        return null;
    }

    // ── Render grid ───────────────────────────────────────────────────────────
    function renderGrid() {
        document.getElementById('menage-grid').innerHTML =
            LOGEMENTS.map(l => renderCard(l)).join('');
    }

    function renderCard(logement) {
        const id       = logement.id;
        const isActive = activeGites.has(id);
        const data     = menageData[id] || { note_permanente: '', protocole: '', signalements: [] };
        const state    = menageState[id] || { assignee: '', fait: false, fait_at: null };
        const sigs     = Array.isArray(data.signalements) ? data.signalements : [];

        // Séjour en cours
        const curClient = (currentRecord && isActive) ? (currentRecord['Nom client'] || '—') : null;
        const curDepart = (currentRecord && isActive) ? currentRecord['Date départ'] : null;

        // Séjour suivant
        const next = getNextStay(id);

        // Équipe select
        const teamOpts = team.length
            ? `<option value="">— Assigner —</option>` +
              team.map(n => `<option value="${escHtml(n)}" ${state.assignee === n ? 'selected' : ''}>${escHtml(n)}</option>`).join('')
            : `<option value="">Gérer l'équipe d'abord…</option>`;

        // Signalements
        const sigHtml = sigs.length
            ? sigs.map(s => `
                <div class="signal-item ${s.statut === 'traite' ? 'traite' : ''}">
                    <div style="flex:1;min-width:0;">
                        <div class="signal-texte">${escHtml(s.texte)}</div>
                        <div class="signal-date">${fmtDate(s.date)}</div>
                    </div>
                    <button class="signal-toggle ${s.statut}"
                            onclick="toggleSignal('${id}','${s.id}')">
                        ${s.statut === 'traite' ? '✓ Traité' : '⚠ À traiter'}
                    </button>
                </div>`).join('')
            : `<div style="color:#ccc;font-size:12px;font-style:italic;">Aucun signalement</div>`;

        // Fait_at label
        const faitAtHtml = state.fait && state.fait_at
            ? `<div class="fait-at"><i class="fa-solid fa-circle-check"></i> ${fmtDatetime(state.fait_at)}</div>`
            : '';

        return `
        <div class="menage-card ${isActive ? 'active' : 'inactive'}">

            <div class="card-header">
                <span class="card-title">
                    <i class="fa-solid fa-house-chimney"></i> ${escHtml(logement.name)}
                </span>
                <span class="card-status-badge ${isActive ? 'used' : 'free'}">
                    ${isActive ? '● Utilisé' : '○ Libre'}
                </span>
            </div>

            <div class="sejours-row">
                <div class="sejour-cell">
                    <div class="sejour-label"><i class="fa-solid fa-right-from-bracket"></i> Départ</div>
                    ${curClient
                        ? `<div class="sejour-client">${escHtml(curClient)}</div>
                           <div class="sejour-date">${fmtDate(curDepart)}</div>`
                        : `<div class="sejour-empty">—</div>`}
                </div>
                <div class="sejour-cell">
                    <div class="sejour-label"><i class="fa-solid fa-right-to-bracket"></i> Arrivée suivante</div>
                    ${next
                        ? `<div class="sejour-client">${escHtml(next.client)}</div>
                           <div class="sejour-date">${fmtDate(next.date)}</div>`
                        : `<div class="sejour-empty">Aucune réservation</div>`}
                </div>
            </div>

            <div class="card-body">

                <div>
                    <div class="section-label"><i class="fa-solid fa-note-sticky"></i> Note permanente</div>
                    <textarea class="note-area"
                        placeholder="Caractéristiques fixes, points d'attention stables…"
                        oninput="debNote('${id}', this.value)">${escHtml(data.note_permanente || '')}</textarea>
                </div>

                <div class="divider"></div>

                <div>
                    <div class="section-label"><i class="fa-solid fa-list-check"></i> Protocole ménage</div>
                    <textarea class="note-area"
                        placeholder="Ordre des tâches, configuration spécifique du logement…"
                        oninput="debProtocole('${id}', this.value)">${escHtml(data.protocole || '')}</textarea>
                </div>

                <div class="divider"></div>

                <div>
                    <div class="section-label"><i class="fa-solid fa-triangle-exclamation"></i> Signalements</div>
                    <div class="signal-list">${sigHtml}</div>
                    <button class="btn-add-signal" onclick="openSignalModal('${id}')">
                        <i class="fa-solid fa-plus"></i> Ajouter un signalement
                    </button>
                </div>

                <div class="divider"></div>

                <div>
                    <div class="section-label"><i class="fa-solid fa-user-check"></i> Assignation</div>
                    <div class="assignation-wrap">
                        <div class="assignation-row">
                            <select class="assign-select" onchange="saveAssignee('${id}', this.value)">
                                ${teamOpts}
                            </select>
                            <label class="fait-wrap" style="cursor:pointer;user-select:none;">
                                <input type="checkbox" class="fait-checkbox"
                                    ${state.fait ? 'checked' : ''}
                                    onchange="toggleFait('${id}', this.checked)">
                                <span class="fait-label">Fait</span>
                            </label>
                        </div>
                        ${faitAtHtml}
                    </div>
                </div>

            </div>
        </div>`;
    }

    // ── Debounce auto-save ────────────────────────────────────────────────────
    const _noteT = {}, _proT = {};
    function debNote(id, val) {
        clearTimeout(_noteT[id]);
        _noteT[id] = setTimeout(() => {
            if (!menageData[id]) menageData[id] = { note_permanente:'', protocole:'', signalements:[] };
            menageData[id].note_permanente = val;
            patchMenage(id, { note_permanente: val });
        }, 900);
    }
    function debProtocole(id, val) {
        clearTimeout(_proT[id]);
        _proT[id] = setTimeout(() => {
            if (!menageData[id]) menageData[id] = { note_permanente:'', protocole:'', signalements:[] };
            menageData[id].protocole = val;
            patchMenage(id, { protocole: val });
        }, 900);
    }

    // ── API ménage ────────────────────────────────────────────────────────────
    async function patchMenage(logementId, fields) {
        try {
            await SesquierUtils.fetchJson(`${API}/api/menage`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ logement_id: logementId, ...fields })
            });
            showToast('Sauvegardé ✓');
        } catch (e) { showToast('Erreur : ' + e.message, true); }
    }

    // ── Signalements ──────────────────────────────────────────────────────────
    function openSignalModal(logementId) {
        currentSignalId = logementId;
        document.getElementById('signal-input').value = '';
        document.getElementById('modal-signal').classList.add('open');
        setTimeout(() => document.getElementById('signal-input').focus(), 80);
    }
    function closeSignalModal() {
        document.getElementById('modal-signal').classList.remove('open');
        currentSignalId = null;
    }
    async function confirmSignal() {
        const texte = document.getElementById('signal-input').value.trim();
        if (!texte || !currentSignalId) return;
        const id = currentSignalId;
        closeSignalModal();
        if (!menageData[id]) menageData[id] = { note_permanente:'', protocole:'', signalements:[] };
        const sigs = [
            { id: uid(), date: new Date().toISOString().split('T')[0], texte, statut: 'a_traiter' },
            ...(menageData[id].signalements || [])
        ];
        menageData[id].signalements = sigs;
        await patchMenage(id, { signalements: sigs });
        renderGrid();
    }
    async function toggleSignal(logementId, sigId) {
        if (!menageData[logementId]) return;
        const sigs = menageData[logementId].signalements.map(s =>
            s.id !== sigId ? s : { ...s, statut: s.statut === 'traite' ? 'a_traiter' : 'traite' }
        );
        menageData[logementId].signalements = sigs;
        await patchMenage(logementId, { signalements: sigs });
        renderGrid();
    }

    // ── Assignation (stockée dans le dossier) ─────────────────────────────────
    async function saveAssignee(logementId, assignee) {
        if (!menageState[logementId]) menageState[logementId] = { assignee:'', fait:false, fait_at:null };
        menageState[logementId].assignee = assignee;
        await saveMenageState();
    }
    async function toggleFait(logementId, checked) {
        if (!menageState[logementId]) menageState[logementId] = { assignee:'', fait:false, fait_at:null };
        menageState[logementId].fait    = checked;
        menageState[logementId].fait_at = checked ? new Date().toISOString() : null;
        await saveMenageState();
        renderGrid();
    }
    async function saveMenageState() {
        if (!currentDossierId) return;
        try {
            await SesquierUtils.fetchJson(API_RES, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: currentDossierId, fields: { 'Menage JSON': JSON.stringify(menageState) } })
            });
            showToast('Assignation sauvegardée ✓');
        } catch (e) { showToast('Erreur : ' + e.message, true); }
    }

    window.onload = loadAll;
</script>
</body>
</html>
