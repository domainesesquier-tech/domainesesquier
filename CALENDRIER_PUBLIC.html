<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Disponibilités — Domaine Sesquier</title>
  <style>
    /* ── Variables ─────────────────────────────────────────────── */
    :root {
      --green-dark:   #1B4332;
      --green-light:  #2D6A4F;
      --beige-light:  #F8F5EF;
      --border:       #E5E7EB;
      --text:         #111827;
      --text-muted:   #6B7280;
      --radius:       8px;
      --header-h:     56px;
    }

    /* ── Reset ─────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--beige-light);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ────────────────────────────────────────────────── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      height: var(--header-h);
      background: #fff;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
    }
    .logo {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 15px;
      font-weight: 600;
      color: var(--green-dark);
      letter-spacing: 0.01em;
    }
    .logo span {
      display: block;
      font-size: 10px;
      font-weight: 400;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ── Main ──────────────────────────────────────────────────── */
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }

    /* ── Month nav ─────────────────────────────────────────────── */
    .month-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 20px;
    }
    .month-nav button {
      width: 32px;
      height: 32px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: #fff;
      cursor: pointer;
      font-size: 16px;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.12s, border-color 0.12s;
    }
    .month-nav button:hover {
      background: var(--beige-light);
      border-color: var(--green-dark);
    }
    .month-label {
      font-size: 17px;
      font-weight: 600;
      min-width: 160px;
      text-align: center;
      color: var(--text);
      text-transform: capitalize;
    }

    /* ── Calendar grid ─────────────────────────────────────────── */
    .calendar {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .cal-head {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      border-bottom: 1px solid var(--border);
    }
    .cal-head-cell {
      padding: 10px 0;
      text-align: center;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .cal-body {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
      background: var(--border);
      padding: 3px;
    }
    .cal-cell {
      min-height: 80px;
      padding: 8px;
      position: relative;
      background: #fff;
      border-radius: 6px;
    }
    .cal-cell.empty {
      background: var(--beige-light);
      opacity: 0.5;
    }
    .cal-cell.today {
      box-shadow: inset 0 0 0 2px var(--green-dark);
    }
    .cal-cell.dispo   { background: #D1FAE5; }
    .cal-cell.demande { background: #FEF3C7; }
    .cal-cell.indispo { background: #FEE2E2; }

    .day-num {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      line-height: 1;
    }
    .cal-cell.today .day-num {
      color: var(--green-dark);
      font-weight: 700;
    }
    .cal-cell.empty .day-num { color: #ccc; }

    /* ── Loading ───────────────────────────────────────────────── */
    .loading {
      grid-column: span 7;
      padding: 48px;
      text-align: center;
      color: var(--text-muted);
      font-size: 14px;
    }

    /* ── Légende ───────────────────────────────────────────────── */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 24px;
      margin-top: 20px;
      padding: 16px 20px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 13px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .legend-dot {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      flex-shrink: 0;
    }
    .legend-dot.dispo   { background: #D1FAE5; border: 1px solid #6EE7B7; }
    .legend-dot.demande { background: #FEF3C7; border: 1px solid #F59E0B; }
    .legend-dot.indispo { background: #FEE2E2; border: 1px solid #EF4444; }

    /* ── Responsive mobile ─────────────────────────────────────── */
    @media (max-width: 600px) {
      header { padding: 0 16px; }
      .cal-cell { min-height: 44px; padding: 4px; }
      .day-num { font-size: 11px; }
      .legend { gap: 8px 16px; font-size: 12px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    Domaine Sesquier
    <span>Disponibilités</span>
  </div>
</header>

<main>
  <div class="month-nav">
    <button id="btn-prev" aria-label="Mois précédent">&#8249;</button>
    <div class="month-label" id="month-label">—</div>
    <button id="btn-next" aria-label="Mois suivant">&#8250;</button>
  </div>

  <div class="calendar">
    <div class="cal-head">
      <div class="cal-head-cell">Lun</div>
      <div class="cal-head-cell">Mar</div>
      <div class="cal-head-cell">Mer</div>
      <div class="cal-head-cell">Jeu</div>
      <div class="cal-head-cell">Ven</div>
      <div class="cal-head-cell">Sam</div>
      <div class="cal-head-cell">Dim</div>
    </div>
    <div class="cal-body" id="cal-body">
      <div class="loading">Chargement…</div>
    </div>
  </div>

  <div class="legend">
    <div class="legend-item">
      <div class="legend-dot dispo"></div>
      <span>Disponible</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot demande"></div>
      <span>Dates demandées ⚠️</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot indispo"></div>
      <span>Indisponible</span>
    </div>
  </div>
</main>

<script>
  /* ── Config ──────────────────────────────────────────────────── */
  const API_BASE    = 'https://domainesesquier-api.domainesesquier.workers.dev';


  /* ── État ────────────────────────────────────────────────────── */
  const MONTHS_FR = ['Janvier','Février','Mars','Avril','Mai','Juin',
                     'Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const today = new Date();
  let currentYear  = today.getFullYear();
  let currentMonth = today.getMonth() + 1;

  /* ── Logique métier ──────────────────────────────────────────── */
  const TYPES_BLOQUANTS   = ['Mariage', 'Week-end privé', 'Séminaire', 'Bloqué'];
  const TYPES_DEMANDE     = ['Mariage', 'Week-end privé', 'Séminaire'];
  const STATUTS_CONFIRMES = ['Confirmé'];
  const STATUTS_DEMANDE   = ['Option', 'À traiter', 'Devis envoyé'];
  const STATUTS_EXCLUS    = ['Annulé', 'Archivé'];

  // Retourne : 2 = Indisponible, 1 = Sur demande, 0 = Disponible, -1 = ignoré
  function priorite(res) {
    const type   = (res.type   || '').trim();
    const statut = (res.statut || '').trim();
    if (STATUTS_EXCLUS.includes(statut)) return -1;
    if (TYPES_BLOQUANTS.includes(type) && STATUTS_CONFIRMES.includes(statut)) return 2;
    if (TYPES_DEMANDE.includes(type)   && STATUTS_DEMANDE.includes(statut))   return 1;
    return 0;
  }

  /* ── Utilitaires date ────────────────────────────────────────── */
  function parseYMD(s) {
    if (!s) return null;
    const [y, m, d] = s.split('-').map(Number);
    return new Date(y, m - 1, d);
  }
  function toYMD(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  function daysInMonth(y, m) { return new Date(y, m, 0).getDate(); }
  function weekday(y, m, d)  { return (new Date(y, m-1, d).getDay() + 6) % 7; } // Lun=0…Dim=6

  /* ── Fetch ───────────────────────────────────────────────────── */
  async function fetchPlanning(year, month) {
    const mois = `${year}-${String(month).padStart(2,'0')}`;
    const res  = await fetch(`${API_BASE}/api/planning?mois=${mois}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    return (data.records || []).map(r => ({
      type:    (r.fields?.['Type']         || r.type        || '').trim(),
      statut:  (r.fields?.['Statut']       || r.statut      || '').trim(),
      arrivee: r.fields?.['Date arrivée']  || r.date_arrivee || null,
      depart:  r.fields?.['Date départ']   || r.date_depart  || null,
    }));
  }

  /* ── Construire la map jour → priorité max ───────────────────── */
  function buildDayMap(reservations, year, month) {
    const dim = daysInMonth(year, month);
    const map = {};
    for (let d = 1; d <= dim; d++) map[toYMD(new Date(year, month-1, d))] = 0;

    for (const res of reservations) {
      const p = priorite(res);
      if (p < 0) continue;
      const arr = parseYMD(res.arrivee);
      const dep = parseYMD(res.depart);
      if (!arr || !dep) continue;
      const cur = new Date(arr);
      while (cur < dep) {
        const key = toYMD(cur);
        if (key in map) map[key] = Math.max(map[key], p);
        cur.setDate(cur.getDate() + 1);
      }
    }
    return map;
  }

  /* ── Rendu ───────────────────────────────────────────────────── */
  function render(dayMap, year, month) {
    document.getElementById('month-label').textContent =
      `${MONTHS_FR[month-1]} ${year}`;

    const dim      = daysInMonth(year, month);
    const offset   = weekday(year, month, 1);
    const todayKey = toYMD(today);
    let html = '';

    for (let i = 0; i < offset; i++) {
      html += '<div class="cal-cell empty"></div>';
    }

    for (let d = 1; d <= dim; d++) {
      const key     = toYMD(new Date(year, month-1, d));
      const p       = dayMap[key] ?? 0;
      const cls     = p === 2 ? 'indispo' : p === 1 ? 'demande' : 'dispo';
      const isToday = key === todayKey ? ' today' : '';
      html += `<div class="cal-cell ${cls}${isToday}"><span class="day-num">${d}</span></div>`;
    }

    const total     = offset + dim;
    const remainder = total % 7 === 0 ? 0 : 7 - (total % 7);
    for (let i = 0; i < remainder; i++) {
      html += '<div class="cal-cell empty"></div>';
    }

    document.getElementById('cal-body').innerHTML = html;
  }

  /* ── Chargement ──────────────────────────────────────────────── */
  async function load() {
    document.getElementById('cal-body').innerHTML = '<div class="loading">Chargement…</div>';
    try {
      const reservations = await fetchPlanning(currentYear, currentMonth);
      const dayMap = buildDayMap(reservations, currentYear, currentMonth);
      render(dayMap, currentYear, currentMonth);
    } catch (e) {
      document.getElementById('cal-body').innerHTML =
        `<div class="loading" style="color:#EF4444">Erreur : ${e.message}</div>`;
    }
  }

  /* ── Navigation ──────────────────────────────────────────────── */
  document.getElementById('btn-prev').addEventListener('click', () => {
    currentMonth--;
    if (currentMonth < 1) { currentMonth = 12; currentYear--; }
    load();
  });
  document.getElementById('btn-next').addEventListener('click', () => {
    currentMonth++;
    if (currentMonth > 12) { currentMonth = 1; currentYear++; }
    load();
  });

  /* ── Init ────────────────────────────────────────────────────── */
  load();
</script>
</body>
</html>
