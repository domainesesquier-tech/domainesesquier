<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rooming List Expert V9 — Domaine Sesquier</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="assets/utils.js"></script>

    <style>
        :root {
            --primary: #3A5538;
            --accent: #9E5D4C;
            --bg: #FDFDFB;
            --border: #E2DDD5;
            --text: #2D302A;
            --text-muted: #777;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding-bottom: 200px;
            font-size: 12px;
        }

        .no-print {
            padding: 12px 24px;
            background: #fff;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .btn-action {
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
            border: 1px solid var(--primary);
            font-size: 13px;
        }

        .btn-save {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 4px 15px rgba(58, 85, 56, 0.2);
        }

        .btn-pdf {
            background: #fff;
            color: var(--primary);
            border: 2px solid var(--primary);
        }

        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 15px;
        }

        .gite-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .gite-card {
            border: 1px solid var(--border);
            border-radius: 15px;
            background: #fff;
            padding: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.02);
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .gite-card.inactive {
            opacity: 0.3;
            filter: grayscale(1);
        }

        .gite-card.inactive .gite-body {
            pointer-events: none;
        }

        .gite-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 1px solid #f2f2f2;
            padding-bottom: 6px;
            margin-bottom: 6px;
        }

        .gite-title-block {
            flex: 1;
        }

        .gite-title {
            font-weight: 700;
            color: var(--primary);
            font-size: 14px;
            margin: 0;
        }

        .gite-desc {
            border: none;
            background: transparent;
            font-size: 10px;
            color: #888;
            width: 100%;
            outline: none;
            font-style: italic;
            margin-top: 1px;
        }

        .gite-amenities {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 2px;
            font-size: 9px;
            color: #999;
            font-weight: 500;
        }

        .amenity {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .room-row {
            display: grid;
            grid-template-columns: 1fr 90px 55px 22px;
            align-items: center;
            gap: 5px;
            padding: 4px 6px;
            background: #F9FAFB;
            border-radius: 8px;
            margin-bottom: 3px;
            border: 1px solid #f1f1f1;
        }

        .editable-name {
            border: none;
            background: transparent;
            font-family: inherit;
            font-size: 11px;
            font-weight: 500;
            color: var(--text);
            outline: none;
        }

        .bed-toggle {
            font-size: 8px;
            font-weight: 800;
            cursor: pointer;
            padding: 2px 4px;
            border-radius: 4px;
            border: 1px solid var(--border);
            background: #fff;
            text-align: center;
            text-transform: uppercase;
        }

        .bed-toggle.twin {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        .bed-toggle.single {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .bed-toggle.quad {
            background: #2D302A;
            color: #fff;
            border-color: #2D302A;
        }

        .bed-toggle.locked {
            cursor: default;
            background: #eee !important;
            color: #aaa !important;
        }

        .count-picker {
            display: flex;
            align-items: center;
            background: #E5E7EB;
            border-radius: 6px;
            overflow: hidden;
        }

        .count-btn {
            width: 18px;
            height: 18px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 10px;
            font-weight: 800;
        }

        .count-val {
            width: 15px;
            text-align: center;
            font-size: 10px;
            font-weight: 800;
        }

        .remove-btn {
            color: #f2f2f2;
            cursor: pointer;
            text-align: center;
            font-size: 10px;
        }

        .room-row:hover .remove-btn {
            color: #EF4444;
        }

        .btn-add-bed {
            background: #fff;
            border: 1px dashed var(--border);
            color: #aaa;
            font-size: 10px;
            padding: 4px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 3px;
            font-weight: 600;
        }

        .gite-footer {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #f2f2f2;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .gite-note-input {
            border: 1px solid #efefef;
            background: #fdfdfd;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 6px;
            width: 70%;
            outline: none;
            color: #555;
            font-family: inherit;
        }

        .gite-note-input::placeholder {
            color: #ccc;
            font-style: italic;
        }

        .grand-total-bar {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--primary);
            color: #fff;
            padding: 15px 35px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 18px;
            box-shadow: 0 15px 40px rgba(58, 85, 56, 0.4);
            display: flex;
            align-items: center;
            gap: 15px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            z-index: 1000;
        }

        .sync-toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #2D302A;
            color: #fff;
            padding: 10px 24px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            z-index: 2000;
            display: none;
        }

        @media print {

            .no-print,
            .btn-add-bed,
            .grand-total-bar,
            .remove-btn {
                display: none !important;
            }

            .gite-note-input {
                border: none !important;
                background: transparent !important;
                padding: 0 !important;
            }
        }
    </style>
</head>

<body>

    <div class="no-print">
        <button class="btn-action btn-pdf" onclick="generatePDF()"><i class="fa-solid fa-file-export"></i> EXPORT
            PDF</button>
        <div style="font-weight: 700; color: var(--primary); font-size: 16px; letter-spacing: 1px;">PLAN D'OCCUPATION
        </div>
        <button class="btn-action btn-save" onclick="saveRooming()"><i class="fa-solid fa-cloud-arrow-up"></i>
            Enregistrer Dossier</button>
    </div>

    <div class="container">
        <div class="gite-grid" id="gite-grid"></div>
    </div>

    <div id="grand-total" class="grand-total-bar">
        <i class="fa-solid fa-users"></i>
        <span>TOTAL GÉNÉRAL : 0 PERSONNES</span>
    </div>

    <div id="sync-toast" class="sync-toast">Enregistré ✓</div>

    <script>
        const INITIAL_GITES = [
            {
                id: "acacia", name: "Acacia", desc: "Appartement 75m2, 2 chambres, séjour transformable en chambre, terrasse", beds: [
                    { name: "Chambre lit double - convertible en twin", type: 'double', locked: false, count: 2 },
                    { name: "Chambre twin - 2 lits simples", type: 'twin', locked: true, count: 2 },
                    { name: "Canapé-lit convertible", type: 'double', locked: false, count: 2 }
                ]
            },
            {
                id: "hibiscus", name: "Hibiscus", desc: "Loft 80m2, 3 chambres dont une en étage-mezzanine, terrasse", beds: [
                    { name: "Chambre lit double - convertible en twin", type: 'double', locked: false, count: 2 },
                    { name: "Chambre twin - 2 lits simples", type: 'twin', locked: true, count: 2 },
                    { name: "Chambre 3 - 4 lits simples", type: 'quad', locked: true, count: 4 }
                ]
            },
            {
                id: "pivoine", name: "Pivoine", desc: "Appartement 75m2, 2 chambres, côté jardin", beds: [
                    { name: "Chambre lit double - convertible en twin", type: 'double', locked: false, count: 2 },
                    { name: "Chambre twin - 2 lits simples", type: 'twin', locked: true, count: 2 }
                ]
            },
            {
                id: "belle", name: "Belle de nuit", desc: "Appartement 80m2, 2 chambres, séjour transformable en chambre, terrasse", beds: [
                    { name: "Chambre lit double - convertible en twin", type: 'double', locked: false, count: 2 },
                    { name: "Chambre twin - 2 lits simples", type: 'twin', locked: true, count: 2 },
                    { name: "Canapé-lit convertible", type: 'double', locked: false, count: 2 }
                ]
            },
            {
                id: "iris", name: "Iris", desc: "Appartement 80m2, 2 chambres, séjour transformable en chambre, balcon plein sud", beds: [
                    { name: "Chambre lit double - convertible en twin", type: 'double', locked: false, count: 2 },
                    { name: "Chambre twin - 2 lits simples", type: 'twin', locked: true, count: 2 }
                ]
            },
            {
                id: "rose", name: "Rose", desc: "Appartement 40m2, 1 chambre, séjour transformable en chambre, espace extérieur", beds: [
                    { name: "Chambre lit double - convertible en twin", type: 'double', locked: false, count: 2 },
                    { name: "Canapé-lit convertible", type: 'double', locked: false, count: 2 }
                ]
            },
            {
                id: "figuier", name: "Figuier", desc: "Appartement 30m2, 1 chambre, espace extérieur PMR", beds: [
                    { name: "Chambre lit double - convertible en twin", type: 'double', locked: false, count: 2 }
                ]
            },
            {
                id: "jasmin", name: "Jasmin", desc: "Appartement 50m2, 1 chambre, séjour transformable en chambre, terrasse", beds: [
                    { name: "Chambre lit double - convertible en twin", type: 'double', locked: false, count: 2 },
                    { name: "Canapé-lit convertible", type: 'double', locked: false, count: 2 }
                ]
            },
            {
                id: "josette", name: "Clos josette", desc: "Maison individuelle à 300m du domaine, 1 chambre, jardin privatif", beds: [
                    { name: "Chambre lit double", type: 'double', locked: false, count: 2 }
                ]
            },
            {
                id: "toits", name: "Sous les toits", desc: "90m2 3 chambres, terrasse", beds: [
                    { name: "Chambre 1 - 2 lits simples", type: 'twin', locked: true, count: 2 },
                    { name: "Chambre 2 - 2 lits simples", type: 'twin', locked: true, count: 2 },
                    { name: "Chambre 3 - 2 lits simples", type: 'twin', locked: true, count: 2 }
                ]
            }
        ];

        let state = {
            id: null,
            clientName: "Client",
            stayDates: "—",
            activeGites: INITIAL_GITES.map(g => g.id),
            configs: {}
        };

        INITIAL_GITES.forEach(g => {
            state.configs[g.id] = {
                beds: g.beds.map(b => ({ ...b })),
                desc: g.desc,
                note: ""
            };
        });

        function toggleGite(id) {
            const idx = state.activeGites.indexOf(id);
            if (idx > -1) state.activeGites.splice(idx, 1);
            else state.activeGites.push(id);
            render();
        }

        function toggleBed(gId, bIdx) {
            const b = state.configs[gId].beds[bIdx];
            if (b.locked) return;
            const cycle = ['double', 'twin', 'single', 'quad'];
            b.type = cycle[(cycle.indexOf(b.type) + 1) % cycle.length];
            render();
        }

        function updateCount(gId, bIdx, delta) {
            const b = state.configs[gId].beds[bIdx];
            b.count = Math.max(0, b.count + delta);
            render();
        }

        function updateBedName(gId, bIdx, val) { state.configs[gId].beds[bIdx].name = val; }
        function updateGiteDesc(gId, val) { state.configs[gId].desc = val; }
        function updateGiteNote(gId, val) { state.configs[gId].note = val; }

        function addExtraBed(gId) {
            state.configs[gId].beds.push({ name: "Lit d'appoint", type: 'single', count: 1, locked: false });
            render();
        }

        function removeBed(gId, bIdx) {
            state.configs[gId].beds.splice(bIdx, 1);
            render();
        }

        function render() {
            const grid = document.getElementById('gite-grid');
            let grandTotal = 0;

            grid.innerHTML = INITIAL_GITES.map(g => {
                const isActive = state.activeGites.includes(g.id);
                const gState = state.configs[g.id];
                let subtotal = 0;

                const bedsHtml = gState.beds.map((b, i) => {
                    if (isActive) subtotal += b.count;
                    const typeLabel = { 'double': 'Lit Double', 'twin': '2 Simples', 'single': '1 Simple', 'quad': '4 Simples' }[b.type];
                    return `
                        <div class="room-row">
                            <input type="text" class="editable-name" value="${b.name}" oninput="updateBedName('${g.id}', ${i}, this.value)">
                            <div class="bed-toggle ${b.type} ${b.locked ? 'locked' : ''}" onclick="toggleBed('${g.id}', ${i})">${typeLabel}</div>
                            <div class="count-picker">
                                <button class="count-btn" onclick="updateCount('${g.id}', ${i}, -1)">-</button>
                                <div class="count-val">${b.count}</div>
                                <button class="count-btn" onclick="updateCount('${g.id}', ${i}, 1)">+</button>
                            </div>
                            <i class="fa-solid fa-trash remove-btn" onclick="removeBed('${g.id}', ${i})"></i>
                        </div>
                    `;
                }).join('');

                if (isActive) grandTotal += subtotal;

                return `
                    <div class="gite-card ${isActive ? '' : 'inactive'}">
                        <div class="gite-header">
                            <div class="gite-title-block">
                                <p class="gite-title">${g.name}</p>
                                <input type="text" class="gite-desc" value="${gState.desc}" oninput="updateGiteDesc('${g.id}', this.value)" placeholder="Description courte...">
                                <div class="gite-amenities">
                                    <div class="amenity"><i class="fa-solid fa-shower"></i> 1 Salle de bain</div>
                                </div>
                            </div>
                            <input type="checkbox" class="toggle-gite" ${isActive ? 'checked' : ''} onclick="toggleGite('${g.id}')">
                        </div>
                        <div class="gite-body">
                            ${bedsHtml}
                            <div class="btn-add-bed" onclick="addExtraBed('${g.id}')">+ Ajouter un couchage</div>
                            <div class="gite-footer">
                                <input type="text" class="gite-note-input" value="${gState.note}" oninput="updateGiteNote('${g.id}', this.value)" placeholder="Note (ex: clé coffre, allergies...)">
                                <div class="gite-subtotal">${subtotal} PERS.</div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            document.getElementById('grand-total').innerHTML = `<i class="fa-solid fa-users"></i> <span>TOTAL GÉNÉRAL : ${grandTotal} PERSONNES</span>`;
        }

        async function generatePDF() {
            const element = document.createElement('div');
            element.style.cssText = 'padding:30px; font-family:Outfit, sans-serif; background:#fff;';

            let gTotal = 0;
            let html = `
                <div style="display:flex; justify-content:space-between; align-items:flex-end; border-bottom:3px solid #3A5538; padding-bottom:15px; margin-bottom:25px;">
                    <div>
                        <h1 style="color:#3A5538; font-size:26px; font-weight:700; margin:0;">DOMAINE SESQUIER</h1>
                        <p style="color:#9E5D4C; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:2px; margin-top:4px;">Logistique Hébergement & Rooming</p>
                    </div>
                    <div style="text-align:right;">
                        <h2 style="font-size:14px; margin:0;">PLAN D'OCCUPATION</h2>
                        <p style="font-size:11px; color:#777; margin-top:2px;">Client : <strong>${state.clientName}</strong></p>
                        <p style="font-size:11px; color:#777;">Séjour : <strong>${state.stayDates}</strong></p>
                    </div>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            `;

            INITIAL_GITES.forEach(g => {
                if (state.activeGites.includes(g.id)) {
                    const gs = state.configs[g.id];
                    let st = 0;
                    html += `<div style="border:1.5px solid #E2DDD5; padding:10px; border-radius:12px; background:#fff; break-inside:avoid;">
                                <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #f0f0f0; padding-bottom:4px; margin-bottom:6px;">
                                    <div>
                                        <div style="font-weight:700; color:#3A5538; font-size:12px;">${g.name}</div>
                                        <div style="font-size:8px; color:#999; font-style:italic;">${gs.desc}</div>
                                    </div>
                                    <div style="font-size:9px; color:#444; font-weight:600;">🚿 1 SdB</div>
                                </div>`;
                    gs.beds.forEach(b => {
                        const typeLabel = { 'double': 'Lit Double', 'twin': '2 Simples', 'single': '1 Simple', 'quad': '4 Simples' }[b.type];
                        st += b.count;
                        html += `<div style="display:flex; justify-content:space-between; font-size:9px; padding:3px 0; border-bottom:1px solid rgba(0,0,0,0.02);">
                                    <span style="color:#444;">${b.name}</span>
                                    <span style="font-weight:600;">${b.count} pers. <span style="font-weight:400; color:#999; font-size:7px;">(${typeLabel})</span></span>
                                 </div>`;
                    });
                    gTotal += st;
                    if (gs.note) html += `<div style="margin-top:5px; padding:4px 6px; background:#f9f9f9; border-radius:4px; font-size:8px; color:#666; font-style:italic;">Note : ${gs.note}</div>`;
                    html += `<div style="text-align:right; font-size:9px; font-weight:800; color:#3A5538; margin-top:5px;">Sous-total : ${st} pers.</div>
                            </div>`;
                }
            });

            html += `</div>
                <div style="margin-top:30px; padding:15px; background:#3A5538; color:#fff; border-radius:12px; display:flex; justify-content:space-between; align-items:center;">
                    <div style="font-size:14px; font-weight:700; letter-spacing:1px;">TOTAL DES PERSONNES HÉBERGÉES</div>
                    <div style="font-size:22px; font-weight:700;">${gTotal} PERSONNES</div>
                </div>
            `;

            element.innerHTML = html;
            html2pdf().set({ margin: 5, filename: `Rooming_${state.clientName}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 3 }, jsPDF: { unit: 'mm', format: 'a4' } }).from(element).save();
        }

        async function saveRooming() {
            if (!state.id) {
                console.error("[ROOMING] Impossible de sauvegarder : Aucun ID de dossier trouvé dans l'URL.");
                alert("Erreur : Aucun dossier chargé. Impossible d'enregistrer.");
                return;
            }

            const btn = document.querySelector('.btn-save');
            const originalHtml = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
            btn.disabled = true;

            try {
                console.log("[ROOMING] Tentative de sauvegarde pour l'ID:", state.id);
                const payload = {
                    id: state.id,
                    fields: { "Rooming JSON": JSON.stringify(state) }
                };

                const result = await SesquierUtils.fetchJson(SesquierUtils.API_RESERVATIONS_URL, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                console.log("[ROOMING] Sauvegarde réussie !", result);
                const t = document.getElementById('sync-toast');
                t.style.display = 'block';
                setTimeout(() => t.style.display = 'none', 3000);
            } catch (e) {
                console.error("[ROOMING] Échec de la sauvegarde Airtable:", e);
                alert("Erreur lors de l'enregistrement : " + (e.message || "Problème de connexion"));
            } finally {
                btn.innerHTML = originalHtml;
                btn.disabled = false;
            }
        }

        async function loadData() {
            const id = new URLSearchParams(window.location.search).get('id');
            if (id) {
                state.id = id;
                try {
                    const r = await fetch(SesquierUtils.API_RESERVATIONS_URL + '?id=' + id).then(r => r.json());
                    const record = r.records ? r.records[0] : r;
                    if (record && record.fields) {
                        state.clientName = record.fields["Nom client"] || "Client";
                        const dArr = record.fields["Date arrivée"] ? new Date(record.fields["Date arrivée"]).toLocaleDateString('fr-FR', { day: 'numeric', month: 'short' }) : "?";
                        const dDep = record.fields["Date départ"] ? new Date(record.fields["Date départ"]).toLocaleDateString('fr-FR', { day: 'numeric', month: 'short', year: 'numeric' }) : "?";
                        state.stayDates = `${dArr} au ${dDep}`;

                        if (record.fields["Rooming JSON"]) {
                            const saved = JSON.parse(record.fields["Rooming JSON"]);
                            state.activeGites = saved.activeGites || state.activeGites;
                            state.configs = saved.configs || state.configs;
                        }
                    }
                } catch (e) { }
            }
            render();
        }
        window.onload = loadData;
    </script>
</body>

</html>
