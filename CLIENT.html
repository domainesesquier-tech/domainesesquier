<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fiche Dossier Client - Domaine Sesquier</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="assets/utils.js"></script>
    <style>
        :root {
            --bg-page: #f8fafc;
            --surface: #ffffff;
            --primary: #3a5538;
            --accent: #b98a4d;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius-lg: 16px;
            --radius-md: 12px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
        }

        body { 
            background: var(--bg-page);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow-y: auto;
            margin: 0;
            padding-bottom: 40px;
        }

        .app-container { max-width: 800px; margin: 0 auto; padding: 20px; }

        /* HEADER */
        .fiche-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            background: var(--surface);
            padding: 20px 24px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .header-title { display: flex; align-items: center; gap: 12px; }
        .header-title i { color: var(--primary); font-size: 20px; }
        .header-title h1 { margin: 0; font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }

        .btn-save {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 600;
            color: white;
            padding: 9px 18px;
            border-radius: 10px;
            background: var(--primary);
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .btn-save:hover { background: #2d4229; }
        .btn-save:disabled { background: #059669; cursor: default; }
        .btn-save.error { background: #dc2626; }

        /* GRID LAYOUT */
        .sections-grid { display: flex; flex-direction: column; gap: 20px; }

        .section-card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .section-header {
            padding: 16px 24px;
            background: #fafafa;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-header h2 { 
            margin: 0; 
            font-size: 13px; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 0.05em; 
            color: var(--text-muted);
        }
        .section-header i { color: var(--accent); font-size: 14px; }

        .section-body { padding: 24px; }

        /* FORMS */
        .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .form-grid.full { grid-template-columns: 1fr; }

        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group label { 
            font-size: 11px; 
            font-weight: 700; 
            color: var(--text-muted); 
            text-transform: uppercase; 
            letter-spacing: 0.02em;
        }

        .input-field {
            height: 42px;
            padding: 0 14px;
            font-size: 14px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: #fcfcfc;
            transition: all 0.2s;
            font-family: inherit;
            color: var(--text-main);
        }
        .input-field:focus {
            outline: none;
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(58, 85, 56, 0.08);
        }
        textarea.input-field { height: auto; padding: 12px 14px; resize: vertical; min-height: 80px; }

        select.input-field { appearance: none; cursor: pointer; }

        /* BADGES */
        .badge-new {
            background: var(--primary);
            color: white;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .loading-overlay {
            position: fixed; top:0; left:0; right:0; bottom:0;
            background: rgba(255,255,255,0.8);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000;
        }

        /* RESPONSIVE */
        @media (max-width: 640px) {
            .form-grid { grid-template-columns: 1fr; }
            .fiche-header { flex-direction: column; align-items: flex-start; gap: 12px; }
        }
    </style>
</head>
<body>
    <div id="loading" class="loading-overlay" style="display:none;">
        <i class="fas fa-spinner fa-spin fa-2x" style="color:var(--primary)"></i>
    </div>

    <div class="app-container">
        <header class="fiche-header">
            <div class="header-title">
                <i class="fas fa-folder-open"></i>
                <h1 id="fiche-title">Dossier Client</h1>
                <span id="new-badge" class="badge-new" style="display:none;">Nouveau</span>
            </div>
            <button class="btn-save" id="btn-save" onclick="saveData()">
                <i class="fas fa-save"></i>
                <span>Enregistrer</span>
            </button>
        </header>

        <div class="sections-grid">
            <!-- SECTION 1: INFOS CLIENT -->
            <div class="section-card">
                <div class="section-header">
                    <i class="fas fa-user-tie"></i>
                    <h2>Informations Client & Entreprise</h2>
                </div>
                <div class="section-body">
                    <div class="form-grid">
                        <div class="form-group" style="grid-column: span 2;">
                            <label>Société / Organisation</label>
                            <input type="text" id="Entreprise" class="input-field" placeholder="Ex: Google France" data-field="Entreprise">
                        </div>
                        <div class="form-group">
                            <label>Prénom du contact</label>
                            <input type="text" id="Prénom" class="input-field" placeholder="Ex: Jean" data-field="Prénom">
                        </div>
                        <div class="form-group">
                            <label>Nom du contact</label>
                            <input type="text" id="Nom" class="input-field" placeholder="Ex: Dupont" data-field="Nom">
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="Email" class="input-field" placeholder="Ex: jean.dupont@entreprise.fr" data-field="Email">
                        </div>
                        <div class="form-group">
                            <label>Téléphone</label>
                            <input type="tel" id="Téléphone" class="input-field" placeholder="Ex: 06 12 34 56 78" data-field="Téléphone">
                        </div>
                    </div>
                </div>
            </div>

            <!-- SECTION 2: ÉVÉNEMENT -->
            <div class="section-card">
                <div class="section-header">
                    <i class="fas fa-calendar-star"></i>
                    <h2>Détails de l'Événement</h2>
                </div>
                <div class="section-body">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Type d'événement</label>
                            <select id="Type" class="input-field" data-field="Type">
                                <option value="Séminaire professionnel">Séminaire professionnel</option>
                                <option value="Séjour privé">Séjour privé</option>
                                <option value="Autre">Autre</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Statut</label>
                            <select id="Statut" class="input-field" data-field="Statut">
                                <option value="à traiter">À traiter</option>
                                <option value="devis envoyé">Devis envoyé</option>
                                <option value="confirmé">Confirmé</option>
                                <option value="effectué">Effectué</option>
                                <option value="annulé">Annulé</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Date d'arrivée</label>
                            <input type="date" id="Date arrivée" class="input-field" data-field="Date arrivée">
                        </div>
                        <div class="form-group">
                            <label>Date de départ</label>
                            <input type="date" id="Date départ" class="input-field" data-field="Date départ">
                        </div>
                        <div class="form-group">
                            <label>Nombre de participants</label>
                            <input type="number" id="Nb personnes" class="input-field" placeholder="Ex: 15" data-field="Nombre de personnes">
                        </div>
                        <div class="form-group">
                            <label>Source du lead</label>
                            <select id="Suivi_Source" class="input-field" data-field="Suivi_Source" onchange="toggleCustomSource(this.value)">
                                <option value="">Choisir...</option>
                                <option value="LinkedIn">LinkedIn</option>
                                <option value="Site Web">Site Web</option>
                                <option value="Kactus">Kactus</option>
                                <option value="Prescripteur">Prescripteur</option>
                                <option value="Bouche à oreille">Bouche à oreille</option>
                                <option value="Autre">Autre (préciser...)</option>
                            </select>
                            <input type="text" id="Custom_Source" class="input-field" placeholder="Précisez la source..." style="margin-top: 8px; display: none;">
                        </div>
                    </div>
                </div>
            </div>

            <!-- SECTION 3: NOTES -->
            <div class="section-card">
                <div class="section-header">
                    <i class="fas fa-comment-dots"></i>
                    <h2>Notes & Besoins Particuliers</h2>
                </div>
                <div class="section-body">
                    <div class="form-group">
                        <textarea id="Message" class="input-field" placeholder="Notes internes, régimes alimentaires, demandes spécifiques..." data-field="Message"></textarea>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let currentId = new URLSearchParams(window.location.search).get('id') || sessionStorage.getItem('currentDossierId');
        let isCreating = !currentId;

        if (currentId === 'null' || currentId === 'undefined') {
            currentId = null;
            isCreating = true;
        }

        // INIT
        if (isCreating) {
            document.getElementById('new-badge').style.display = 'inline-block';
            document.getElementById('fiche-title').innerText = "Nouveau Dossier Client";
        } else {
            loadRecord(currentId);
        }

        // Update title live when Entreprise changes
        document.getElementById('Entreprise')?.addEventListener('input', function() {
            const title = this.value.trim() || "Nouveau Dossier";
            document.getElementById('fiche-title').innerText = title;
        });

        async function loadRecord(id) {
            document.getElementById('loading').style.display = 'flex';
            try {
                const data = await SesquierUtils.fetchJson(`${SesquierUtils.API_RESERVATIONS_URL}?id=${id}&t=${Date.now()}`);
                const record = data.records ? data.records[0] : data;
                if (!record?.fields) throw new Error("Dossier introuvable.");
                
                const f = record.fields;
                // Fix header title
                document.getElementById('fiche-title').innerText = f["Nom client"] || "Dossier #" + id.slice(-4);

                document.querySelectorAll('.input-field').forEach(input => {
                    const field = input.dataset.field;
                    let val = f[field];
                    if (Array.isArray(val)) val = val[0];
                    input.value = val || "";
                });

                // PARSE SPECIAL FIELDS
                // Priorité : colonnes directes (entreprise, prenom_contact, nom_contact)
                // Fallback : parser nom_client si les colonnes sont vides
                const nomClient = f["Nom client"] || "";
                const entrepriseDirect = f["Entreprise"] || "";
                const prenomDirect     = f["Prénom contact"] || "";
                const nomDirect        = f["Nom contact"] || "";

                if (entrepriseDirect) {
                    document.getElementById('Entreprise').value = entrepriseDirect;
                    document.getElementById('Prénom').value = prenomDirect;
                    document.getElementById('Nom').value = nomDirect;
                } else if (nomClient.includes('(')) {
                    document.getElementById('Entreprise').value = nomClient.split(' (')[0];
                    const contact = nomClient.split(' (')[1].replace(')', '');
                    document.getElementById('Prénom').value = contact.split(' ')[0] || "";
                    document.getElementById('Nom').value = contact.split(' ').slice(1).join(' ') || "";
                } else {
                    document.getElementById('Entreprise').value = nomClient;
                }

                // Téléphone : colonne directe en priorité, sinon legacy depuis Message
                const telDirect = f["Téléphone"] || "";
                const msg = f["Message"] || "";
                const telMatch = msg.match(/Tél: (.*)\n?/);
                document.getElementById('Téléphone').value = telDirect || (telMatch ? telMatch[1] : "");

                // Source du lead
                const sourceMatch = msg.match(/Source: (.*)\n?/);
                if (sourceMatch) {
                    const sv = sourceMatch[1].trim();
                    const select = document.getElementById('Suivi_Source');
                    const opts = Array.from(select.options).map(o => o.value);
                    if (opts.includes(sv)) {
                        select.value = sv;
                    } else {
                        select.value = "Autre";
                        document.getElementById('Custom_Source').value = sv;
                        document.getElementById('Custom_Source').style.display = 'block';
                    }
                }

                // Message propre (sans les lignes "Source:")
                document.getElementById('Message').value = msg.replace(/Tél: .*\n?/, '').replace(/Source: .*\n?/, '').trim();
                
            } catch (err) {
                showToast("Erreur : " + err.message, true);
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        let _clientSaving = false;
        async function saveData() {
            if (_clientSaving) return;
            _clientSaving = true;

            const btn = document.getElementById('btn-save');
            if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> <span>Enregistrement...</span>'; }

            try {
                // Combine name fields for Airtable "Nom client"
                const entreprise = (document.getElementById('Entreprise')?.value || '').trim();
                const prenom     = (document.getElementById('Prénom')?.value     || '').trim();
                const nom        = (document.getElementById('Nom')?.value        || '').trim();
                const fullContactName = (prenom + " " + nom).trim();
                const nomClient = entreprise && fullContactName ? `${entreprise} (${fullContactName})` : (entreprise || fullContactName || "Sans nom");

                // Build payload — noms de champs exacts du FIELD_MAP worker, valeurs en string/number (jamais en tableau)
                const typeVal   = (document.getElementById('Type')?.value   || '').trim();
                const statutVal = (document.getElementById('Statut')?.value || '').trim();
                const sourceVal = document.getElementById('Suivi_Source')?.value === 'Autre'
                    ? document.getElementById('Custom_Source')?.value
                    : document.getElementById('Suivi_Source')?.value;

                const fields = {
                    "Nom client":          nomClient,
                    "Entreprise":          entreprise  || null,
                    "Prénom contact":      prenom      || null,
                    "Nom contact":         nom         || null,
                    "Email":               document.getElementById('Email')?.value?.trim()       || null,
                    "Téléphone":           document.getElementById('Téléphone')?.value?.trim()   || null,
                    "Type":                typeVal   || null,
                    "Statut":              statutVal || null,
                    "Date arrivée":        document.getElementById('Date arrivée')?.value         || null,
                    "Date départ":         document.getElementById('Date départ')?.value          || null,
                    "Nombre de personnes": parseInt(document.getElementById('Nb personnes')?.value,   10) || 0,
                    "Repas petit-déjeuner":parseInt(document.getElementById('Repas petit-déj')?.value, 10) || 0,
                    "Repas déjeuner":      parseInt(document.getElementById('Repas déjeuner')?.value,  10) || 0,
                    "Repas dîner":         parseInt(document.getElementById('Repas dîner')?.value,     10) || 0,
                    "Qté collation":       parseInt(document.getElementById('Qté Collation')?.value,   10) || 0,
                    "Message":             (
                        (sourceVal ? `Source: ${sourceVal}\n` : '') +
                        (document.getElementById('Message')?.value || '')
                    ).trim() || null,
                };

                if (isCreating) {
                    const res = await SesquierUtils.fetchJson(SesquierUtils.API_RESERVATIONS_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ fields })
                    });

                    if (!res || !res.id) throw new Error("Réponse invalide du serveur (id manquant).");
                    currentId = res.id;
                    isCreating = false;
                    const newBadgeEl = document.getElementById('new-badge');
                    if (newBadgeEl) newBadgeEl.style.display = 'none';
                    sessionStorage.setItem('currentDossierId', currentId);
                    SesquierUtils.broadcast('devis_created', { id: currentId });
                } else {
                    await SesquierUtils.fetchJson(SesquierUtils.API_RESERVATIONS_URL, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ id: currentId, fields })
                    });
                }

                if (btn) { btn.innerHTML = '<i class="fas fa-check"></i> <span>Mise à jour effectuée !</span>'; btn.style.background = '#059669'; }
                setTimeout(() => {
                    if (btn) { btn.innerHTML = '<i class="fas fa-save"></i> <span>Enregistrer</span>'; btn.style.background = ''; btn.disabled = false; }
                    _clientSaving = false;
                }, 2500);
                SesquierUtils.broadcast('RECORD_UPDATED', { id: currentId, fields });
            } catch (err) {
                console.error("Save error:", err);
                if (btn) { btn.innerHTML = '<i class="fas fa-circle-exclamation"></i> <span>Erreur</span>'; btn.className = 'btn-save error'; btn.disabled = false; }
                _clientSaving = false;
                showToast("Échec de sauvegarde : " + err.message, true);
                setTimeout(() => {
                    if (btn) { btn.innerHTML = '<i class="fas fa-save"></i> <span>Enregistrer</span>'; btn.className = 'btn-save'; }
                }, 3000);
            }
        }

        function toggleCustomSource(val) {
            const customInput = document.getElementById('Custom_Source');
            if (!customInput) return;
            if (val === 'Autre') {
                customInput.style.display = 'block';
                customInput.focus();
            } else {
                customInput.style.display = 'none';
                customInput.value = '';
            }
        }

        function showToast(msg, isError = false) {
            const t = document.getElementById('toast');
            if (!t) return;
            t.innerHTML = `<i class="fas fa-${isError ? 'circle-xmark' : 'circle-check'}"></i> ${msg}`;
            t.className = 'toast show' + (isError ? ' error' : '');
            setTimeout(() => t.className = 'toast', 3000);
        }

        function handleMessage(event) {
            if (event.data.type === 'RECORD_UPDATED' && event.data.id === currentId) {
                // If update came from elsewhere, reload to keep source of truth
                // But avoid reload if WE are currently typing
                if (document.activeElement.classList.contains('input-field')) return;
                loadRecord(currentId);
            }
        }
        window.addEventListener('message', handleMessage);

    </script>
</body>
</html>
